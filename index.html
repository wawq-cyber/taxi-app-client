<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Taxi Stable v15 FIXED FULL</title>

<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#f1c40f">

<script src="https://unpkg.com/maplibre-gl@3.6.2/dist/maplibre-gl.js"></script>
<link href="https://unpkg.com/maplibre-gl@3.6.2/dist/maplibre-gl.css" rel="stylesheet"/>

<style>
body { margin:0; font-family:sans-serif; }
#map { width:100%; height:100vh; }

.start {
position:fixed; inset:0;
background:white;
display:flex;
justify-content:center;
align-items:center;
z-index:1000;
}

.box { width:300px; }

.input, .input2, .field {
width:100%;
padding:10px;
margin-bottom:10px;
border-radius:10px;
border:1px solid #ddd;
}

.btn, .btn2 {
width:100%;
padding:12px;
border:none;
border-radius:10px;
cursor:pointer;
font-weight:bold;
}

.btn { background:#f1c40f; }

.top {
position:absolute;
top:15px;
left:10px;
width:320px;
z-index:10;
}

.panel {
position:absolute;
bottom:20px;
left:10px;
width:320px;
background:white;
padding:12px;
border-radius:15px;
display:none;
z-index:20;
}

.row { display:flex; gap:10px; }

.order { background:#f1c40f; }
.price { background:#e74c3c; color:white; }

.suggest {
background:white;
max-height:180px;
overflow:auto;
}

.item { padding:10px; cursor:pointer; }

.modal {
position:fixed;
inset:0;
background:rgba(0,0,0,0.5);
display:none;
justify-content:center;
align-items:center;
z-index:9999;
}

.modal-content {
background:white;
padding:20px;
border-radius:15px;
width:300px;
}

.ctrl {
position:absolute;
right:10px;
top:120px;
display:flex;
flex-direction:column;
gap:8px;
}

.ctrl button { padding:10px; border:none; border-radius:8px; }

.map-small { height:80vh !important; }
</style>
</head>

<body>

<div class="start" id="start">
  <div class="box">
    <h3>Данные</h3>
    <input id="name" class="input" placeholder="Имя">
    <input id="phone" class="input" placeholder="+48 9 цифр">
    <button class="btn" id="startBtn">Начать</button>
  </div>
</div>

<div id="map"></div>

<div class="top">
  <input id="from" class="input2" placeholder="Откуда">
  <input id="to" class="input2" placeholder="Куда">
  <div id="suggest" class="suggest"></div>
</div>

<div class="panel" id="panel">
  <div id="price"></div>
  <div class="row">
    <button class="btn2 price" id="custom">Своя цена</button>
    <button class="btn2 order" id="orderBtn">Заказать</button>
  </div>
</div>

<div class="modal" id="modal">
  <div class="modal-content">
    <input id="priceInput" class="field">
    <input id="priceSlider" type="range" class="field">
    <button id="submitPrice" class="btn2 order">OK</button>
  </div>
</div>

<div class="modal" id="timeout">
  <div class="modal-content">
    <p>Водитель не найден</p>
    <button id="cont">Продолжить</button>
    <button id="cancel">Отмена</button>
  </div>
</div>

<div id="finalPriceText" style="position:absolute;bottom:100px;left:10px;background:#fff;padding:10px;"></div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
import { getDatabase, ref, push, set, get, remove, onValue } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-database.js";

const app = initializeApp({
apiKey:"x",
databaseURL:"x"
});
const db = getDatabase(app);

let map, from, to;
let minPrice = 0;
let customPrice = 0;
let currentOrder = null;
let timer = null;

window.isOrder = false;

/* SEARCH */
document.getElementById('from').oninput = async e => search(e.target.value, 'from');
document.getElementById('to').oninput = async e => search(e.target.value, 'to');

let activeField = null;

async function search(q, field){
activeField = field;
if(q.length < 3) return;

const r = await fetch(`https://api.maptiler.com/geocoding/${encodeURIComponent(q)}.json?key=demo`);
const d = await r.json();

const box = document.getElementById('suggest');
box.innerHTML = '';

d.features.forEach(p=>{
const el = document.createElement('div');
el.className='item';
el.innerText = p.place_name;

el.onclick=()=>{
if(field==='from') from = p.center;
else to = p.center;

document.getElementById(field).value = p.place_name;
box.innerHTML='';
build();
};
box.appendChild(el);
});
}

/* ROUTE */
async function build(){
if(!from || !to) return;

const r = await fetch(`https://router.project-osrm.org/route/v1/driving/${from[0]},${from[1]};${to[0]},${to[1]}?overview=full&geometries=geojson`);
const d = await r.json();

const route = d.routes[0];
const km = route.distance/1000;

minPrice = Math.round(km*2.5+10);

document.getElementById('price').innerText = minPrice;
document.getElementById('panel').style.display='block';
}

/* PRICE LOGIC */
document.getElementById('custom').onclick=()=>{
document.getElementById('modal').style.display='flex';

customPrice = minPrice;

document.getElementById('priceInput').value = minPrice;
document.getElementById('priceSlider').min = minPrice;
document.getElementById('priceSlider').max = minPrice*5;
};

function clamp(v){
v = Number(v);
if(v < minPrice) return minPrice;
return v;
}

document.getElementById('priceInput').oninput=e=>{
customPrice = clamp(e.target.value);
};

document.getElementById('priceSlider').oninput=e=>{
customPrice = clamp(e.target.value);
document.getElementById('priceInput').value = customPrice;
};

document.getElementById('submitPrice').onclick=()=>{
document.getElementById('price').innerText = customPrice;
document.getElementById('modal').style.display='none';
};

/* ORDER */
document.getElementById('orderBtn').onclick=async ()=>{
window.isOrder = true;

document.getElementById('finalPriceText').innerText =
"Стоимость поездки составляет: " + customPrice;

startTimer();

/* Firebase order */
const refOrder = push(ref(db,'orders'));
currentOrder = refOrder.key;

await set(ref(db,'orders/'+currentOrder),{
price:customPrice,
status:"searching",
clientCoords:from,
createdAt:Date.now()
});

/* 3D */
document.getElementById('map').classList.add('map-small');

setTimeout(()=>{
if(map && from && to){
map.fitBounds([from,to],{padding:100});
map.easeTo({pitch:60,bearing:-20});
}
},500);
};

/* TIMER */
function startTimer(){
clearTimeout(timer);
timer=setTimeout(()=>{
document.getElementById('timeout').style.display='flex';
},60000);
}

document.getElementById('cancel').onclick=async()=>{
if(currentOrder){
await remove(ref(db,'orders/'+currentOrder));
currentOrder=null;
}
window.isOrder=false;
document.getElementById('timeout').style.display='none';
};

document.getElementById('cont').onclick=()=>{
document.getElementById('timeout').style.display='none';
startTimer();
};

/* RESTORE */
setTimeout(async()=>{
const snap = await get(ref(db,'orders'));
const data = snap.val();
if(!data) return;
const active = Object.entries(data).find(([k,v])=>v.status!=="done");
if(active){
customPrice = active[1].price;
document.getElementById('finalPriceText').innerText =
"Стоимость поездки составляет: " + customPrice;
}
},800);

</script>

<script>
document.getElementById('startBtn').onclick=()=>{
document.getElementById('start').style.display='none';

map = new maplibregl.Map({
container:'map',
style:'https://api.maptiler.com/maps/streets-v2/style.json?key=demo',
center:[21,52],
zoom:12
});
};
</script>

</body>
</html>
