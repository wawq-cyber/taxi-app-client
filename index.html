<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Taxi Stable v20 FIREBASE</title>

<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#f1c40f">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<meta name="apple-mobile-web-app-title" content="Taxi App">
<link rel="apple-touch-icon" href="https://cdn-icons-png.flaticon.com/512/71/71222.png">

<script src="https://unpkg.com/maplibre-gl@3.6.2/dist/maplibre-gl.js"></script>
<link href="https://unpkg.com/maplibre-gl@3.6.2/dist/maplibre-gl.css" rel="stylesheet"/>

<style>
body { margin:0; font-family:sans-serif; overflow: hidden; touch-action: manipulation; }
#map { width:100%; height:100vh; }

/* ОКНО ВХОДА */
.start { position:fixed; inset:0; background:white; display:flex; justify-content:center; align-items:center; z-index:2000; }
.box { width:300px; }
.input { width:100%; padding:12px; margin-bottom:10px; border-radius:10px; border:1px solid #ddd; box-sizing: border-box; }
.btn { width:100%; padding:12px; border:none; border-radius:10px; background:#f1c40f; font-weight:bold; cursor:pointer; }
.error { color:red; font-size:12px; display:none; margin-top:-5px; margin-bottom:8px; }

/* ПОИСК */
.top { position:absolute; top:15px; left:10px; width:320px; z-index:10; transition: opacity 0.3s; }
.box2 { background:white; padding:10px; border-radius:15px; box-shadow:0 4px 15px rgba(0,0,0,0.1); }
.input2 { width:100%; padding:10px; border-radius:10px; border:1px solid #eee; margin-bottom:6px; box-sizing: border-box; }
.logout-btn { font-size: 11px; color: #999; text-decoration: underline; cursor: pointer; float: right; margin-bottom: 5px; }

/* ПАНЕЛЬ ЗАКАЗА */
.panel { position:absolute; bottom:20px; left:10px; width:320px; background:white; padding:12px; border-radius:15px; display:none; z-index:20; box-shadow:0 4px 15px rgba(0,0,0,0.1); }
.row { display:flex; gap:10px; margin-top:10px; }
.btn2 { flex:1; padding:12px; border:none; border-radius:10px; font-weight:bold; cursor:pointer; }
.order { background:#f1c40f; }
.price { background:#e74c3c; color:white; }

/* КНОПКИ 2D/3D */
.ctrl { position:absolute; right:10px; top:120px; z-index:10; display:flex; flex-direction:column; gap:8px; }
.ctrl button { background:white; border:none; padding:10px; border-radius:8px; cursor:pointer; box-shadow:0 2px 8px rgba(0,0,0,0.2); font-weight:bold; }

/* СТАТУС */
#driver-status { display:none; position:absolute; top:100px; left:50%; transform:translateX(-50%); background:rgba(0,0,0,0.85); color:white; padding:15px 25px; border-radius:20px; z-index:1000; text-align:center; box-shadow:0 4px 15px rgba(0,0,0,0.3); width: 80%; max-width: 320px; }
.loader { border: 3px solid #f3f3f3; border-top: 3px solid #f1c40f; border-radius: 50%; width: 18px; height: 18px; animation: spin 1s linear infinite; display: inline-block; vertical-align: middle; margin-right: 8px; }
@keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
.btn-cancel { background: #e74c3c; color: white; margin-top: 10px; width: 100%; font-size: 14px; }
</style>
</head>

<body>

<div id="driver-status"></div>

<div class="start" id="start">
    <div class="box">
        <h3>Ваши данные</h3>
        <input id="name" class="input" placeholder="Имя">
        <div style="display:flex; gap:6px; align-items:center; margin-bottom:10px;">
            <span style="font-weight:bold;">+48</span>
            <input id="phone" class="input" style="margin-bottom:0;" placeholder="9 цифр" inputmode="numeric" oninput="this.value=this.value.replace(/\D/g,'').slice(0,9);">
        </div>
        <div class="error" id="phoneError">Введите корректный номер (9 цифр)</div>
        <button class="btn" id="startBtn">Продолжить</button>
    </div>
</div>

<div id="map"></div>

<div class="top" id="top-search">
    <div class="box2">
        <span class="logout-btn" id="logoutBtn">Сменить данные</span>
        <div style="clear:both;"></div>
        <input id="from" class="input2" placeholder="Откуда (текущее место)" readonly>
        <input id="to" class="input2" placeholder="Куда (нажмите на карту)">
    </div>
</div>

<div class="ctrl">
    <button id="btn2d">2D</button>
    <button id="btn3d">3D</button>
</div>

<div class="panel" id="panel">
    <div>Заказчик: <b id="outName"></b> (<span id="outPhone"></span>)</div>
    <hr>
    <div>Расстояние: <b id="km"></b> км (~<b id="min"></b> мин)</div>
    <div style="font-size: 20px; margin-top: 5px;">Цена: <b id="price"></b> zł</div>
    <div class="row">
        <button class="btn2 price" id="custom">Своя цена</button>
        <button class="btn2 order" id="orderBtn">Заказать</button>
    </div>
</div>

<script type="module">
  import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
  import { getDatabase, ref, push, set, get, onValue, remove } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-database.js";

  const firebaseConfig = {
    apiKey: "AIzaSyAf-9-A72oCswBCQIilwuE6FEYt_MN2PbU",
    authDomain: "taxi-app-41298.firebaseapp.com",
    databaseURL: "https://taxi-app-41298-default-rtdb.europe-west1.firebasedatabase.app",
    projectId: "taxi-app-41298",
    storageBucket: "taxi-app-41298.firebasestorage.app",
    messagingSenderId: "1011260164934",
    appId: "1:1011260164934:web:1972a0315325b3f5d3b347"
  };

  const app = initializeApp(firebaseConfig);
  const db = getDatabase(app);

  let currentOrderId = localStorage.getItem('activeOrderId');
  window.isOrderPending = false;

  window.showStatus = function(text, showCancel = false) {
      const el = document.getElementById('driver-status');
      if (!text) { el.style.display = 'none'; return; }
      el.innerHTML = text;
      if (showCancel) el.innerHTML += `<br><button class="btn btn-cancel" onclick="window.resetOrderUI()">Отменить поиск</button>`;
      el.style.display = 'block';
  }

  window.resetOrderUI = async function() {
      if(currentOrderId) await remove(ref(db, `orders/${currentOrderId}`));
      localStorage.removeItem('activeOrderId');
      currentOrderId = null;
      window.isOrderPending = false;
      window.showStatus("");
      document.getElementById('panel').style.display = 'block';
      document.getElementById('top-search').style.opacity = '1';
      document.getElementById('top-search').style.pointerEvents = 'auto';
  };

  window.sendOrderToFirebase = async function() {
      window.isOrderPending = true;
      document.getElementById('panel').style.display = 'none';
      document.getElementById('top-search').style.opacity = '0.5';
      document.getElementById('top-search').style.pointerEvents = 'none';
      window.showStatus(`<div class="loader"></div> Поиск водителя...`, true);

      const orderData = {
          clientName: sessionStorage.getItem('userName'),
          clientPhone: "+48" + sessionStorage.getItem('userPhone'),
          fromAddress: document.getElementById('from').value,
          toAddress: document.getElementById('to').value,
          clientCoords: window.clientCoords,
          destCoords: window.destCoords,
          price: document.getElementById('price').innerText,
          status: "searching",
          createdAt: Date.now()
      };

      if (!currentOrderId) {
          const newOrderRef = push(ref(db, 'orders'));
          currentOrderId = newOrderRef.key;
          localStorage.setItem('activeOrderId', currentOrderId);
      }
      await set(ref(db, 'orders/' + currentOrderId), orderData);

      onValue(ref(db, 'orders/' + currentOrderId), (snap) => {
          const order = snap.val();
          if (order?.status === 'accepted') {
              window.showStatus(`<b>Водитель принял заказ!</b><br>Машина выехала.`);
          }
      });
  };

  window.checkActiveOrder = async function() {
      if (!currentOrderId) return;
      const snap = await get(ref(db, `orders/${currentOrderId}`));
      const order = snap.val();
      if (order && (order.status === 'searching' || order.status === 'accepted')) {
          window.isOrderPending = true;
          document.getElementById('top-search').style.opacity = '0.5';
          document.getElementById('top-search').style.pointerEvents = 'none';
          if (window.restoreRoute) window.restoreRoute(order.clientCoords, order.destCoords, order.fromAddress, order.toAddress);
          if (order.status === 'searching') window.showStatus(`<div class="loader"></div> Поиск водителя...`, true);
          else window.showStatus(`<b>Водитель принял заказ!</b>`);
      } else { localStorage.removeItem('activeOrderId'); }
  };
</script>

<script>
let map, from, to, minPrice, destMarker, userMarker;

async function reverse(c){
    const r=await fetch(`https://api.maptiler.com/geocoding/${c[0]},${c[1]}.json?key=umzJGOnUyr8Edm12MN9b`);
    const d=await r.json(); return d.features?.[0]?.place_name||'';
}

function initApp() {
    document.getElementById('start').style.display = 'none';
    map = new maplibregl.Map({
        container: 'map',
        style: 'https://api.maptiler.com/maps/streets-v4/style.json?key=umzJGOnUyr8Edm12MN9b',
        center: [21.01, 52.23], zoom: 12
    });

    userMarker = new maplibregl.Marker({color:'blue'}).setLngLat([21.01, 52.23]).addTo(map);
    destMarker = new maplibregl.Marker({color:'red', draggable:true});

    map.on('load', () => {
        navigator.geolocation.getCurrentPosition(async p => {
            from = [p.coords.longitude, p.coords.latitude];
            userMarker.setLngLat(from);
            map.flyTo({center: from, zoom: 15, duration: 2000});
            document.getElementById('from').value = await reverse(from);
        });

        if(window.checkActiveOrder) window.checkActiveOrder();
    });

    map.on('click', async e => {
        if(window.isOrderPending) return;
        to = [e.lngLat.lng, e.lngLat.lat];
        document.getElementById('to').value = await reverse(to);
        build();
    });

    destMarker.on('dragend', async () => {
        if(window.isOrderPending) return;
        to = [destMarker.getLngLat().lng, destMarker.getLngLat().lat];
        document.getElementById('to').value = await reverse(to);
        build();
    });

    // ОБРАБОТЧИКИ 2D/3D
    document.getElementById('btn2d').onclick = () => map.easeTo({pitch: 0, bearing: 0});
    document.getElementById('btn3d').onclick = () => map.easeTo({pitch: 60, bearing: -20});
}

async function build() {
    if (!from || !to) return;
    const r = await fetch(`https://router.project-osrm.org/route/v1/driving/${from[0]},${from[1]};${to[0]},${to[1]}?overview=full&geometries=geojson`);
    const d = await r.json();
    const route = d.routes[0];
    
    const km = (route.distance/1000).toFixed(1);
    minPrice = Math.round(km * 2.5 + 10);

    if (!window.isOrderPending) document.getElementById('panel').style.display = 'block';

    document.getElementById('outName').innerText = sessionStorage.getItem('userName');
    document.getElementById('outPhone').innerText = "+48 " + sessionStorage.getItem('userPhone');
    document.getElementById('km').innerText = km;
    document.getElementById('min').innerText = Math.round(route.duration/60);
    document.getElementById('price').innerText = minPrice;

    if (map.getSource('route')) map.getSource('route').setData(route.geometry);
    else {
        map.addSource('route', {type:'geojson', data:route.geometry});
        map.addLayer({id:'route', type:'line', source:'route', paint:{'line-color':'#f1c40f', 'line-width':5}});
    }
    destMarker.setLngLat(to).addTo(map);
    map.fitBounds([from, to], {padding: 80, duration: 1500});
}

window.restoreRoute = (sf, st, fa, ta) => {
    from = sf; to = st;
    document.getElementById('from').value = fa;
    document.getElementById('to').value = ta;
    build();
};

document.getElementById('startBtn').onclick = () => {
    const n = document.getElementById('name').value;
    const p = document.getElementById('phone').value;
    if (n.length < 2 || p.length !== 9) {
        document.getElementById('phoneError').style.display = 'block';
        return;
    }
    sessionStorage.setItem('userName', n);
    sessionStorage.setItem('userPhone', p);
    initApp();
};

if (sessionStorage.getItem('userName')) initApp();

document.getElementById('logoutBtn').onclick = () => {
    if(confirm("Выйти?")) {
        sessionStorage.clear();
        localStorage.removeItem('activeOrderId');
        location.reload();
    }
};

document.getElementById('orderBtn').onclick = () => window.sendOrderToFirebase();

setInterval(() => {
    window.map = map; window.clientCoords = from; window.destCoords = to;
}, 500);
</script>
</body>
</html>
