<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Taxi v26 FINAL RECOVERY</title>
<script src="https://unpkg.com/maplibre-gl@3.6.2/dist/maplibre-gl.js"></script>
<link href="https://unpkg.com/maplibre-gl@3.6.2/dist/maplibre-gl.css" rel="stylesheet"/>
<style>
    body { margin:0; font-family:sans-serif; overflow: hidden; touch-action: manipulation; }
    #map { width:100%; height:100vh; }
    .start { position:fixed; inset:0; background:white; display:flex; justify-content:center; align-items:center; z-index:2000; }
    .box { width:300px; }
    .input { width:100%; padding:12px; margin-bottom:10px; border-radius:10px; border:1px solid #ddd; box-sizing: border-box; }
    .btn { width:100%; padding:12px; border:none; border-radius:10px; background:#f1c40f; font-weight:bold; cursor:pointer; }
    .error { color:red; font-size:12px; display:none; margin-top:-5px; margin-bottom:8px; }
    .top { position:absolute; top:15px; left:10px; width:320px; z-index:10; transition: opacity 0.3s; }
    .box2 { background:white; padding:10px; border-radius:15px; box-shadow:0 4px 15px rgba(0,0,0,0.1); }
    .input2 { width:100%; padding:10px; border-radius:10px; border:1px solid #eee; margin-bottom:6px; box-sizing: border-box; }
    .panel { position:absolute; bottom:20px; left:10px; width:320px; background:white; padding:12px; border-radius:15px; display:none; z-index:20; box-shadow:0 4px 15px rgba(0,0,0,0.1); }
    .row { display:flex; gap:10px; margin-top:10px; }
    .btn2 { flex:1; padding:12px; border:none; border-radius:10px; font-weight:bold; cursor:pointer; }
    .order { background:#f1c40f; }
    .price-btn { background:#e74c3c; color:white; }
    .map-controls { position:absolute; right:10px; top:100px; z-index:100; display:flex; flex-direction:column; gap:8px; }
    .map-controls button { width:40px; height:40px; background:white; border:none; border-radius:8px; cursor:pointer; box-shadow:0 2px 8px rgba(0,0,0,0.2); font-weight:bold; font-size:18px; }
    .modal { position:fixed; inset:0; background:rgba(0,0,0,0.5); display:none; justify-content:center; align-items:center; z-index:9999; }
    .modal-content { background:white; padding:20px; border-radius:15px; width:300px; }
    #driver-status { display:none; position:absolute; top:100px; left:50%; transform:translateX(-50%); background:rgba(0,0,0,0.85); color:white; padding:15px 25px; border-radius:20px; z-index:1000; text-align:center; box-shadow:0 4px 15px rgba(0,0,0,0.3); width: 80%; max-width: 320px; }
</style>
</head>
<body>

<div id="driver-status"></div>

<div class="start" id="start">
    <div class="box">
        <h3>Ваши данные</h3>
        <input id="name" class="input" placeholder="Имя">
        <div style="display:flex; gap:6px; align-items:center; margin-bottom:10px;">
            <span style="font-weight:bold;">+48</span>
            <input id="phone" class="input" style="margin-bottom:0;" 
                   placeholder="9 цифр" 
                   type="tel" 
                   inputmode="numeric" 
                   pattern="[0-9]*" 
                   oninput="this.value = this.value.replace(/[^0-9]/g, '').slice(0, 9);">
        </div>
        <div class="error" id="phoneError">Введите корректный номер (9 цифр)</div>
        <button class="btn" id="startBtn">Продолжить</button>
    </div>
</div>

<div id="map"></div>

<div class="top" id="top-search">
    <div class="box2">
        <span onclick="localStorage.clear(); sessionStorage.clear(); location.reload();" style="font-size:11px; color:#999; text-decoration:underline; cursor:pointer; float:right;">Выйти</span>
        <div style="clear:both;"></div>
        <input id="from" class="input2" placeholder="Откуда (определение...)" readonly>
        <input id="to" class="input2" placeholder="Куда (нажмите на карту)">
    </div>
</div>

<div class="map-controls">
    <button onclick="map.zoomIn()">+</button>
    <button onclick="map.zoomOut()">−</button>
    <button onclick="map.easeTo({pitch:0})">2D</button>
    <button onclick="map.easeTo({pitch:60})">3D</button>
</div>

<div class="panel" id="panel">
    <div>Заказчик: <b id="outName"></b></div>
    <div>До цели: <b id="km"></b> км</div>
    <div style="font-size: 20px; margin-top: 5px;">Цена: <b id="price"></b> zł</div>
    <div class="row">
        <button class="btn2 price-btn" id="custom">Своя цена</button>
        <button class="btn2 order" id="orderBtn">Заказать</button>
    </div>
</div>

<div class="modal" id="modal-price">
    <div class="modal-content">
        <h3>Ваша цена</h3>
        <input id="priceInput" class="input" type="number">
        <input id="priceSlider" style="width:100%" type="range">
        <button id="submitPrice" class="btn2 order" style="margin-top:10px">Установить</button>
    </div>
</div>

<script type="module">
  import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
  import { getDatabase, ref, push, set, onValue, get } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-database.js";

  const firebaseConfig = {
    apiKey: "AIzaSyAf-9-A72oCswBCQIilwuE6FEYt_MN2PbU",
    authDomain: "taxi-app-41298.firebaseapp.com",
    databaseURL: "https://taxi-app-41298-default-rtdb.europe-west1.firebasedatabase.app",
    projectId: "taxi-app-41298",
    storageBucket: "taxi-app-41298.firebasestorage.app",
    messagingSenderId: "1011260164934",
    appId: "1:1011260164934:web:1972a0315325b3f5d3b347"
  };

  const app = initializeApp(firebaseConfig);
  const db = getDatabase(app);

  window.saveOrder = async () => {
      const orderId = localStorage.getItem('activeOrderId');
      const data = {
          clientName: sessionStorage.getItem('userName'),
          clientPhone: "+48" + sessionStorage.getItem('userPhone'),
          fromAddress: document.getElementById('from').value,
          toAddress: document.getElementById('to').value,
          clientCoords: window.clientCoords,
          destCoords: window.destCoords,
          price: document.getElementById('price').innerText,
          status: "searching",
          createdAt: Date.now()
      };
      
      const newRef = orderId ? ref(db, 'orders/' + orderId) : push(ref(db, 'orders'));
      if(!orderId) localStorage.setItem('activeOrderId', newRef.key);
      
      await set(newRef, data);
      window.startOrderTracking(localStorage.getItem('activeOrderId'));
  };

  window.startOrderTracking = (id) => {
      window.isOrderPending = true;
      document.getElementById('panel').style.display = 'none';
      document.getElementById('top-search').style.opacity = '0.5';
      document.getElementById('driver-status').style.display = 'block';
      document.getElementById('driver-status').innerHTML = "Поиск водителя...<br><button onclick='localStorage.removeItem(\"activeOrderId\");location.reload()' style='color:red;background:none;border:none;text-decoration:underline;cursor:pointer;'>Отменить</button>";

      onValue(ref(db, 'orders/' + id), (snap) => {
          const order = snap.val();
          if (order?.status === 'accepted') {
              document.getElementById('driver-status').innerHTML = "<b>Водитель найден!</b><br>Машина выехала.";
          }
      });
      
      setTimeout(async () => {
          const s = await get(ref(db, 'orders/' + id));
          if(s.val()?.status === 'searching') {
              alert("Водители не найдены. Попробуйте увеличить цену.");
              localStorage.removeItem('activeOrderId');
              location.reload();
          }
      }, 60000);
  };
</script>

<script>
let map, from, to, minPrice, destMarker;
window.map = null;

async function reverse(c){
    try {
        const r=await fetch(`https://api.maptiler.com/geocoding/${c[0]},${c[1]}.json?key=umzJGOnUyr8Edm12MN9b`);
        const d=await r.json(); return d.features?.[0]?.place_name||'Неизвестно';
    } catch(e) { return 'Ошибка адреса'; }
}

function initApp() {
    document.getElementById('start').style.display = 'none';
    map = new maplibregl.Map({
        container: 'map',
        style: 'https://api.maptiler.com/maps/streets-v4/style.json?key=umzJGOnUyr8Edm12MN9b',
        center: [21.01, 52.23], zoom: 12
    });
    window.map = map;
    destMarker = new maplibregl.Marker({color:'red', draggable:true});

    map.on('load', async () => {
        const savedFrom = localStorage.getItem('lastFrom');
        const savedTo = localStorage.getItem('lastTo');

        if (savedFrom && savedTo) {
            from = JSON.parse(savedFrom); to = JSON.parse(savedTo);
            window.clientCoords = from; window.destCoords = to;
            new maplibregl.Marker({color:'blue'}).setLngLat(from).addTo(map);
            document.getElementById('from').value = await reverse(from);
            document.getElementById('to').value = await reverse(to);
            build();
        } else {
            navigator.geolocation.getCurrentPosition(async p => {
                from = [p.coords.longitude, p.coords.latitude];
                window.clientCoords = from;
                new maplibregl.Marker({color:'blue'}).setLngLat(from).addTo(map);
                map.flyTo({center: from, zoom: 15});
                document.getElementById('from').value = await reverse(from);
            });
        }

        const activeId = localStorage.getItem('activeOrderId');
        if(activeId && window.startOrderTracking) window.startOrderTracking(activeId);
    });

    map.on('click', async e => {
        if(window.isOrderPending) return;
        to = [e.lngLat.lng, e.lngLat.lat];
        window.destCoords = to;
        localStorage.setItem('lastTo', JSON.stringify(to));
        localStorage.setItem('lastFrom', JSON.stringify(from));
        document.getElementById('to').value = await reverse(to);
        build();
    });

    destMarker.on('dragend', async () => {
        if(window.isOrderPending) return;
        to = [destMarker.getLngLat().lng, destMarker.getLngLat().lat];
        window.destCoords = to;
        localStorage.setItem('lastTo', JSON.stringify(to));
        document.getElementById('to').value = await reverse(to);
        build();
    });
}

async function build() {
    if (!from || !to) return;
    const r = await fetch(`https://router.project-osrm.org/route/v1/driving/${from[0]},${from[1]};${to[0]},${to[1]}?overview=full&geometries=geojson`);
    const d = await r.json();
    const route = d.routes[0];
    const km = (route.distance/1000).toFixed(1);
    minPrice = Math.round(km * 2.5 + 10);

    document.getElementById('panel').style.display = 'block';
    document.getElementById('outName').innerText = sessionStorage.getItem('userName');
    document.getElementById('km').innerText = km;
    document.getElementById('price').innerText = minPrice;

    if (map.getSource('route')) map.getSource('route').setData(route.geometry);
    else {
        map.addSource('route', {type:'geojson', data:route.geometry});
        map.addLayer({id:'route', type:'line', source:'route', paint:{'line-color':'#f1c40f', 'line-width':5}});
    }
    destMarker.setLngLat(to).addTo(map);
    map.fitBounds([from, to], {padding: 70});
}

document.getElementById('custom').onclick = () => {
    document.getElementById('modal-price').style.display = 'flex';
    document.getElementById('priceInput').value = minPrice;
    document.getElementById('priceSlider').min = minPrice;
    document.getElementById('priceSlider').max = minPrice * 5;
    document.getElementById('priceSlider').value = minPrice;
};
document.getElementById('priceSlider').oninput = (e) => { document.getElementById('priceInput').value = e.target.value; };
document.getElementById('submitPrice').onclick = () => {
    let v = parseInt(document.getElementById('priceInput').value);
    document.getElementById('price').innerText = (isNaN(v) || v < minPrice) ? minPrice : v;
    document.getElementById('modal-price').style.display = 'none';
};

document.getElementById('startBtn').onclick = () => {
    const n = document.getElementById('name').value;
    const p = document.getElementById('phone').value;
    if (n.length < 2 || p.length !== 9) { document.getElementById('phoneError').style.display = 'block'; return; }
    sessionStorage.setItem('userName', n);
    sessionStorage.setItem('userPhone', p);
    initApp();
};

if (sessionStorage.getItem('userName')) initApp();
document.getElementById('orderBtn').onclick = () => {
    map.easeTo({pitch: 60});
    window.saveOrder();
};
</script>
</body>
</html>
