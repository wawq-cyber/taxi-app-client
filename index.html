<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Taxi Stable v15.1 RECOVERY</title>

<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#f1c40f">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<meta name="apple-mobile-web-app-title" content="Taxi App">
<link rel="apple-touch-icon" href="https://cdn-icons-png.flaticon.com/512/71/71222.png">

<script src="https://unpkg.com/maplibre-gl@3.6.2/dist/maplibre-gl.js"></script>
<link href="https://unpkg.com/maplibre-gl@3.6.2/dist/maplibre-gl.css" rel="stylesheet"/>

<style>
body { margin:0; font-family:sans-serif; }
#map { width:100%; height:100vh; }

/* START */
.start {
position:fixed; inset:0;
background:white;
display:flex;
justify-content:center;
align-items:center;
z-index:1000;
}

.box { width:300px; }

.input {
width:100%;
padding:12px;
margin-bottom:10px;
border-radius:10px;
border:1px solid #ddd;
box-sizing: border-box;
}

.btn {
width:100%;
padding:12px;
border:none;
border-radius:10px;
background:#f1c40f;
font-weight:bold;
cursor:pointer;
}

.error {
color:red;
font-size:12px;
display:none;
margin-top:-5px;
margin-bottom:8px;
}

/* SEARCH */
.top {
position:absolute;
top:15px;
left:10px;
width:320px;
z-index:10;
transition: opacity 0.3s;
}

.box2 {
background:white;
padding:10px;
border-radius:15px;
box-shadow:0 4px 15px rgba(0,0,0,0.1);
}

.input2 {
width:100%;
padding:10px;
border-radius:10px;
border:1px solid #eee;
margin-bottom:6px;
box-sizing: border-box;
}

.suggest {
background:white;
max-height:180px;
overflow:auto;
border-radius:10px;
box-shadow:0 4px 10px rgba(0,0,0,0.15);
}

.item {
padding:10px;
cursor:pointer;
border-bottom:1px solid #eee;
}
.item:hover { background:#f1f1f1; }

/* PANEL */
.panel {
position:absolute;
bottom:20px;
left:10px;
width:320px;
background:white;
padding:12px;
border-radius:15px;
display:none;
z-index:20;
box-shadow:0 4px 15px rgba(0,0,0,0.1);
}

.row {
display:flex;
gap:10px;
margin-top:10px;
}

.btn2 {
flex:1;
padding:12px;
border:none;
border-radius:10px;
font-weight:bold;
cursor:pointer;
}

.order { background:#f1c40f; }
.price { background:#e74c3c; color:white; }

/* MODAL */
.modal {
position:fixed;
inset:0;
background:rgba(0,0,0,0.5);
display:none;
justify-content:center;
align-items:center;
z-index:9999;
}

.modal-content {
background:white;
padding:20px;
border-radius:15px;
width:300px;
}

.field {
width:100%;
padding:10px;
margin-bottom:10px;
border-radius:10px;
border:1px solid #ddd;
box-sizing: border-box;
}

/* 2D / 3D */
.ctrl {
position:absolute;
right:10px;
top:120px;
z-index:10;
display:flex;
flex-direction:column;
gap:8px;
}

.ctrl button {
background:white;
border:none;
padding:10px;
border-radius:8px;
cursor:pointer;
box-shadow:0 2px 8px rgba(0,0,0,0.2);
}

/* UTILS */
.loader { border: 3px solid #f3f3f3; border-top: 3px solid #f1c40f; border-radius: 50%; width: 18px; height: 18px; animation: spin 1s linear infinite; display: inline-block; vertical-align: middle; margin-right: 8px; }
@keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
</style>
</head>

<body>

<div id="driver-status" style="display:none; position:absolute; top:80px; left:50%; transform:translateX(-50%); background:rgba(0,0,0,0.8); color:white; padding:15px 25px; border-radius:20px; z-index:1000; text-align:center; box-shadow:0 4px 15px rgba(0,0,0,0.3); width: 80%; max-width: 320px;"></div>

<div class="start" id="start">
    <div class="box">
        <h3>Данные</h3>
        <input id="name" class="input" placeholder="Имя">
        <div style="display:flex; gap:6px; align-items:center;">
            <span style="font-weight:bold;">+48</span>
            <input id="phone" class="input" placeholder="9 цифр" inputmode="numeric">
        </div>
        <div class="error" id="phoneError">Неверный номер</div>
        <button class="btn" id="startBtn">Начать</button>
    </div>
</div>

<div id="map"></div>

<div class="top" id="top-search">
    <div class="box2">
        <span onclick="localStorage.clear(); sessionStorage.clear(); location.reload();" style="font-size:10px; color:gray; cursor:pointer; float:right;">Выйти</span>
        <div style="clear:both"></div>
        <input id="from" class="input2" placeholder="Откуда">
        <input id="to" class="input2" placeholder="Куда">
        <div class="suggest" id="suggest"></div>
    </div>
</div>

<div class="panel" id="panel">
    <div>Имя: <b id="outName"></b></div>
    <div>Телефон: <b id="outPhone"></b></div>
    <hr>
    <div>Км: <b id="km"></b></div>
    <div>Мин: <b id="min"></b></div>
    <div>Цена: <b id="price"></b> zł</div>
    <div class="row">
        <button class="btn2 price" id="custom">Своя цена</button>
        <button class="btn2 order" id="orderBtn">Заказать</button>
    </div>
</div>

<div class="modal" id="modal">
    <div class="modal-content">
        <h3>Своя цена</h3>
        <div>Минимум: <b id="minPrice"></b> zł</div>
        <input id="priceInput" class="field" type="number">
        <input id="priceSlider" class="field" type="range">
        <select id="reason" class="field">
            <option>Спешу</option>
            <option>На работу</option>
            <option>На автобус</option>
            <option>Другое</option>
        </select>
        <button id="submitPrice" class="btn2 order">OK</button>
    </div>
</div>

<div class="modal" id="modal-timeout">
    <div class="modal-content" style="text-align:center;">
        <div style="font-size: 50px; margin-bottom: 10px;">⏳</div>
        <h3>Водитель не найден</h3>
        <p style="color: #666; font-size: 14px; margin-bottom: 20px;">К сожалению, сейчас поблизости нет свободных машин. Хотите продолжить поиск или отменить заказ?</p>
        <div class="row">
            <button class="btn2" id="timeout-cancel" style="background:#eee;">Отменить</button>
            <button class="btn2 order" id="timeout-continue">Продолжить</button>
        </div>
    </div>
</div>

<div class="ctrl">
    <button id="btn2d">2D</button>
    <button id="btn3d">3D</button>
</div>

<script type="module">
  import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
  import { getDatabase, ref, push, set, get, onValue, remove } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-database.js";

  const firebaseConfig = {
    apiKey: "AIzaSyAf-9-A72oCswBCQIilwuE6FEYt_MN2PbU",
    authDomain: "taxi-app-41298.firebaseapp.com",
    databaseURL: "https://taxi-app-41298-default-rtdb.europe-west1.firebasedatabase.app",
    projectId: "taxi-app-41298",
    storageBucket: "taxi-app-41298.firebasestorage.app",
    messagingSenderId: "1011260164934",
    appId: "1:1011260164934:web:1972a0315325b3f5d3b347"
  };

  const app = initializeApp(firebaseConfig);
  const db = getDatabase(app);

  let currentOrderId = null;
  let rejectedDrivers = [];
  let searchTimer = null;

  function getDist(c1, c2) {
      const R = 6371;
      const dLat = (c2[1]-c1[1])*Math.PI/180;
      const dLon = (c2[0]-c1[0])*Math.PI/180;
      const a = Math.sin(dLat/2)**2 + Math.cos(c1[1]*Math.PI/180)*Math.cos(c2[1]*Math.PI/180)*Math.sin(dLon/2)**2;
      return R * 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1-a));
  }

  function showStatus(text) {
      const el = document.getElementById('driver-status');
      if (text) { el.innerHTML = text; el.style.display = 'block'; }
      else { el.style.display = 'none'; }
  }

  window.resetOrderUI = async function() {
      clearTimeout(searchTimer);
      searchTimer = null;
      window.isOrderPending = false;
      if(currentOrderId) {
          await remove(ref(db, `orders/${currentOrderId}`));
          currentOrderId = null;
      }
      localStorage.removeItem('activeOrderId');
      rejectedDrivers = [];
      showStatus("");
      document.getElementById('panel').style.display = 'block';
      document.getElementById('top-search').style.pointerEvents = 'auto';
      document.getElementById('top-search').style.opacity = '1';
  };

  document.getElementById('timeout-continue').onclick = () => {
      document.getElementById('modal-timeout').style.display = 'none';
      window.sendOrderToFirebase(); 
  };

  document.getElementById('timeout-cancel').onclick = () => {
      document.getElementById('modal-timeout').style.display = 'none';
      window.resetOrderUI();
  };

  window.sendOrderToFirebase = async function() {
    const name = sessionStorage.getItem('uName');
    const phoneVal = sessionStorage.getItem('uPhone');
    const finalPrice = window.customPrice || window.minPrice;
    
    window.isOrderPending = true;
    document.getElementById('panel').style.display = 'none';
    document.getElementById('top-search').style.pointerEvents = 'none';
    document.getElementById('top-search').style.opacity = '0.5';

    // ЭФФЕКТ: Весь маршрут и 3D
    window.map.fitBounds([window.clientCoords, window.destCoords], {padding: 100});
    window.map.easeTo({pitch: 60, duration: 1000});

    showStatus(`<div class="loader"></div> Поиск машины...<br><span style="font-size:13px; opacity:0.8;">Стоимость поездки составляет: <b>${finalPrice} zł</b></span>`);

    if(!searchTimer) {
        searchTimer = setTimeout(async () => {
            if (currentOrderId) {
                const snap = await get(ref(db, 'orders/' + currentOrderId));
                if (snap.val()?.status === 'searching') {
                    document.getElementById('modal-timeout').style.display = 'flex';
                }
            }
        }, 60000);
    }

    const driversSnap = await get(ref(db, 'drivers'));
    const drivers = driversSnap.val();

    if (!drivers) {
        setTimeout(() => document.getElementById('modal-timeout').style.display = 'flex', 2000);
        return;
    }

    let nearest = Object.keys(drivers)
        .map(id => ({id, ...drivers[id]}))
        .filter(d => d.status === 'online' && !rejectedDrivers.includes(d.id))
        .map(d => ({...d, dist: getDist(window.clientCoords, d.coords)}))
        .sort((a,b) => a.dist - b.dist)[0];

    if (!nearest) {
        document.getElementById('modal-timeout').style.display = 'flex';
        return;
    }

    const orderData = {
        clientName: name,
        clientPhone: "+48" + phoneVal,
        fromAddress: document.getElementById('from').value,
        toAddress: document.getElementById('to').value,
        clientCoords: window.clientCoords,
        destCoords: window.destCoords,
        distance: document.getElementById('km').innerText,
        price: finalPrice,
        status: "searching",
        assignedDriverId: nearest.id,
        createdAt: Date.now()
    };

    if (!currentOrderId) {
        const newRef = push(ref(db, 'orders'));
        currentOrderId = newRef.key;
        localStorage.setItem('activeOrderId', currentOrderId);
    }
    
    await set(ref(db, 'orders/' + currentOrderId), orderData);

    onValue(ref(db, 'orders/' + currentOrderId), (snap) => {
        const order = snap.val();
        if (!order) return;
        if (order.status === 'rejected') {
            rejectedDrivers.push(order.assignedDriverId);
            window.sendOrderToFirebase(); 
        }
        if (order.status === 'accepted') {
            clearTimeout(searchTimer);
            showStatus(`<b>Водитель найден!</b><br>Машина выехала к вам.`);
        }
    });
  };

  window.initRecovery = async (mapObj) => {
      const saved = localStorage.getItem('taxi_state');
      if (saved) {
          const state = JSON.parse(saved);
          window.from = state.from;
          window.to = state.to;
          window.customPrice = state.price;
          window.clientCoords = state.from;
          window.destCoords = state.to;
          
          document.getElementById('from').value = state.fromAddr;
          document.getElementById('to').value = state.toAddr;
          
          // Вызов глобальной функции build из внешнего скрипта
          window.triggerBuild();
      }
      
      const activeId = localStorage.getItem('activeOrderId');
      if (activeId) {
          currentOrderId = activeId;
          window.sendOrderToFirebase();
      }
  };
</script>

<script>
let map, from=null, to=null, minPrice=0, activeInput=null, customPrice=0, destMarker;
window.isOrderPending = false;

const phone=document.getElementById('phone');
phone.addEventListener('input',()=>{ phone.value=phone.value.replace(/\D/g,'').slice(0,9); });

function loginSuccess() {
    document.getElementById('start').style.display='none';
    map=new maplibregl.Map({
        container:'map',
        style:'https://api.maptiler.com/maps/streets-v4/style.json?key=umzJGOnUyr8Edm12MN9b',
        center:[21.01,52.23], zoom:13, pitch:45
    });
    window.map = map;
    const userMarker=new maplibregl.Marker({color:'blue'});
    destMarker = new maplibregl.Marker({color:'red', draggable:true});

    map.on('load', async () => { 
        userMarker.addTo(map); 
        // Попытка восстановления
        const module = await import('https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js');
        window.initRecovery(map);
        
        if (!from) {
            navigator.geolocation.getCurrentPosition(async p=>{
                from=[p.coords.longitude,p.coords.latitude];
                window.clientCoords = from;
                userMarker.setLngLat(from);
                map.flyTo({center:from,zoom:15});
                document.getElementById('from').value=await reverse(from);
            });
        } else {
            userMarker.setLngLat(from);
        }
    });

    map.on('click',async e=>{
        if(window.isOrderPending) return;
        to=[e.lngLat.lng,e.lngLat.lat];
        window.destCoords = to;
        destMarker.setLngLat(to).addTo(map);
        document.getElementById('to').value=await reverse(to);
        build();
    });

    destMarker.on('dragend',async()=>{
        if(window.isOrderPending) { destMarker.setLngLat(to); return; }
        const p=destMarker.getLngLat();
        to=[p.lng,p.lat];
        window.destCoords = to;
        document.getElementById('to').value=await reverse(to);
        build();
    });
}

document.getElementById('startBtn').onclick=()=>{
    const n = document.getElementById('name').value.trim();
    if(!n || phone.value.length!==9){ document.getElementById('phoneError').style.display='block'; return; }
    sessionStorage.setItem('uName', n);
    sessionStorage.setItem('uPhone', phone.value);
    loginSuccess();
};

async function reverse(c){
    const r=await fetch(`https://api.maptiler.com/geocoding/${c[0]},${c[1]}.json?key=umzJGOnUyr8Edm12MN9b`);
    const d=await r.json(); return d.features?.[0]?.place_name||'';
}

const fromInput=document.getElementById('from'), toInput=document.getElementById('to');
fromInput.onfocus=()=>activeInput='from';
toInput.onfocus=()=>activeInput='to';
[fromInput,toInput].forEach(i=>{ i.oninput=()=>search(i.value); });

async function search(q){
    if(q.length<3)return;
    const r=await fetch(`https://api.maptiler.com/geocoding/${encodeURIComponent(q)}.json?key=umzJGOnUyr8Edm12MN9b&limit=5`);
    const d=await r.json();
    const box=document.getElementById('suggest'); box.innerHTML='';
    d.features.forEach(p=>{
        const el=document.createElement('div'); el.className='item'; el.innerText=p.place_name;
        el.onclick=()=>{
            if(activeInput==='from'){ from=p.center; window.clientCoords=from; document.getElementById('from').value=p.place_name; }
            if(activeInput==='to'){ to=p.center; window.destCoords=to; document.getElementById('to').value=p.place_name; }
            box.innerHTML=''; build();
        };
        box.appendChild(el);
    });
}

window.triggerBuild = () => build();

async function build(){
    if(!from||!to)return;
    const r=await fetch(`https://router.project-osrm.org/route/v1/driving/${from[0]},${from[1]};${to[0]},${to[1]}?overview=full&geometries=geojson`);
    const d=await r.json();
    const route=d.routes[0];
    const km=(route.distance/1000).toFixed(1);
    minPrice=Math.round(km*2.5+10);
    window.minPrice = minPrice;

    document.getElementById('panel').style.display='block';
    document.getElementById('outName').innerText=sessionStorage.getItem('uName');
    document.getElementById('outPhone').innerText='+48 '+sessionStorage.getItem('uPhone');
    document.getElementById('km').innerText=km;
    document.getElementById('min').innerText=Math.round(route.duration/60);
    
    // Если есть сохраненная цена и она не меньше минимума, берем её
    if(!customPrice || customPrice < minPrice) customPrice = minPrice;
    document.getElementById('price').innerText=customPrice;
    window.customPrice = customPrice;

    if(map.getSource('route')) map.getSource('route').setData(route.geometry);
    else {
        map.addSource('route',{type:'geojson',data:route.geometry});
        map.addLayer({id:'route', type:'line', source:'route', paint:{'line-color':'#f1c40f','line-width':5}});
    }
    destMarker.setLngLat(to).addTo(map);
    map.fitBounds([from,to],{padding:80});

    // Сохранение в память
    localStorage.setItem('taxi_state', JSON.stringify({
        from, to, price: customPrice, fromAddr: document.getElementById('from').value, toAddr: document.getElementById('to').value
    }));
}

document.getElementById('custom').onclick=()=>{
    document.getElementById('modal').style.display='flex';
    document.getElementById('minPrice').innerText=minPrice;
    document.getElementById('priceInput').value=customPrice;
    document.getElementById('priceSlider').min=minPrice;
    document.getElementById('priceSlider').max=minPrice*5;
    document.getElementById('priceSlider').value=customPrice;
};

// ЛОГИКА ЦЕНЫ: ввод вручную + ползунок
document.getElementById('priceSlider').oninput = (e) => {
    customPrice = Number(e.target.value);
    document.getElementById('priceInput').value = customPrice;
};

document.getElementById('submitPrice').onclick = () => {
    let val = Number(document.getElementById('priceInput').value);
    if (isNaN(val) || val < minPrice) val = minPrice; // Сброс до минимума если ввели меньше
    customPrice = val;
    window.customPrice = val;
    document.getElementById('price').innerText = val;
    document.getElementById('modal').style.display = 'none';
    build(); // Обновляем localStorage
};

document.getElementById('orderBtn').onclick=()=>window.sendOrderToFirebase();
document.getElementById('btn2d').onclick=()=>map.easeTo({pitch:0,bearing:0});
document.getElementById('btn3d').onclick=()=>map.easeTo({pitch:60,bearing:-20});

if(sessionStorage.getItem('uName')) loginSuccess();
</script>
</body>
</html>
