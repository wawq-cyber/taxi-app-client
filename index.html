<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Taxi Stable v15 FIREBASE</title>

<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#f1c40f">

<script src="https://unpkg.com/maplibre-gl@3.6.2/dist/maplibre-gl.js"></script>
<link href="https://unpkg.com/maplibre-gl@3.6.2/dist/maplibre-gl.css" rel="stylesheet"/>

<style>
body { margin:0; font-family:sans-serif; }
#map { width:100%; height:100vh; }

.map-small { height:80vh !important; }

.start {
position:fixed; inset:0;
background:white;
display:flex;
justify-content:center;
align-items:center;
z-index:1000;
}

.box { width:300px; }

.input {
width:100%;
padding:12px;
margin-bottom:10px;
border-radius:10px;
border:1px solid #ddd;
}

.btn {
width:100%;
padding:12px;
border:none;
border-radius:10px;
background:#f1c40f;
font-weight:bold;
cursor:pointer;
}

.panel {
position:absolute;
bottom:20px;
left:10px;
width:320px;
background:white;
padding:12px;
border-radius:15px;
display:none;
z-index:20;
}

.row { display:flex; gap:10px; margin-top:10px; }

.btn2 {
flex:1;
padding:12px;
border:none;
border-radius:10px;
font-weight:bold;
cursor:pointer;
}

.order { background:#f1c40f; }
.price { background:#e74c3c; color:white; }

#driver-status {
position:absolute;
top:80px;
left:50%;
transform:translateX(-50%);
background:rgba(0,0,0,0.8);
color:white;
padding:12px;
border-radius:12px;
z-index:1000;
display:none;
}

#finalPriceText{
position:absolute;
bottom:100px;
left:10px;
background:white;
padding:10px;
border-radius:10px;
z-index:50;
}

#timeoutModal{
display:none;
position:fixed;
inset:0;
background:rgba(0,0,0,.5);
justify-content:center;
align-items:center;
z-index:9999;
}
</style>
</head>

<body>

<div id="driver-status"></div>

<div class="start" id="start">
  <div class="box">
    <input id="name" class="input" placeholder="Имя">
    <div style="display:flex; gap:6px;">
      <span>+48</span>
      <input id="phone" class="input" placeholder="9 цифр">
    </div>
    <button class="btn" id="startBtn">Начать</button>
  </div>
</div>

<div id="map"></div>

<div id="finalPriceText"></div>

<div id="timeoutModal">
  <div style="background:white;padding:20px;border-radius:15px;width:300px;text-align:center;">
    <h3>Водитель не найден</h3>
    <p>Продолжить поиск?</p>
    <button id="continueSearch">Продолжить поиск</button>
    <button id="cancelSearch">Отменить</button>
  </div>
</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
import { getDatabase, ref, push, set, get, onValue, remove } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-database.js";

const app = initializeApp({
  apiKey: "AIza...",
  databaseURL: "https://YOUR_DB.firebaseio.com"
});

const db = getDatabase(app);

let map;
let from = null;
let to = null;
let currentOrderId = null;
let customPrice = 0;
let minPrice = 0;

window.isOrderPending = false;

/* ================= MAP ================= */
document.getElementById('startBtn').onclick = () => {
  document.getElementById('start').style.display = 'none';

  map = new maplibregl.Map({
    container: 'map',
    style: 'https://api.maptiler.com/maps/streets-v4/style.json?key=KEY',
    center: [21,52],
    zoom: 13,
    pitch: 45
  });

  navigator.geolocation.getCurrentPosition(p => {
    from = [p.coords.longitude, p.coords.latitude];
    map.flyTo({center: from, zoom: 15});
  });

  map.on('click', e => {
    if (window.isOrderPending) return;
    to = [e.lngLat.lng, e.lngLat.lat];
    build();
  });

  window.restoreOrder();
};

/* ================= ROUTE ================= */
async function build() {
  if (!from || !to) return;

  const r = await fetch(
    `https://router.project-osrm.org/route/v1/driving/${from[0]},${from[1]};${to[0]},${to[1]}?overview=full&geometries=geojson`
  );

  const d = await r.json();
  const route = d.routes[0];

  const km = route.distance / 1000;
  const min = route.duration / 60;

  minPrice = Math.round(km * 2.5 + 10);
  customPrice = minPrice;

  document.getElementById('finalPriceText').innerText =
    "Стоимость поездки составляет: " + customPrice + " zł";

  if (map.getSource('route')) {
    map.getSource('route').setData(route.geometry);
  } else {
    map.addSource('route', {type:'geojson', data:route.geometry});
    map.addLayer({
      id:'route',
      type:'line',
      source:'route',
      paint:{'line-color':'#f1c40f','line-width':5}
    });
  }

  map.fitBounds([from, to], {padding:80});
}

/* ================= ORDER ================= */
window.sendOrderToFirebase = async function () {

  window.isOrderPending = true;

  const driversSnap = await get(ref(db,'drivers'));
  const drivers = driversSnap.val();
  if (!drivers) return;

  const nearest = Object.entries(drivers)
    .map(([id,d]) => ({id,...d}))
    .filter(d => d.status === 'online')
    .map(d => ({...d, dist: getDist(from,d.coords)}))
    .sort((a,b)=>a.dist-b.dist)[0];

  const orderRef = push(ref(db,'orders'));
  currentOrderId = orderRef.key;

  const order = {
    clientName: document.getElementById('name').value,
    clientPhone: "+48"+document.getElementById('phone').value,
    from,
    to,
    price: customPrice,
    status: "searching",
    assignedDriverId: nearest.id,
    createdAt: Date.now()
  };

  await set(ref(db,'orders/'+currentOrderId), order);

  startSearchTimer();

  onValue(ref(db,'orders/'+currentOrderId), snap => {
    const o = snap.val();
    if (!o) return;

    if (o.status === "accepted") {
      window.isOrderPending = true;
      trackDriver(o.assignedDriverId);
      document.getElementById('finalPriceText').innerText =
        "Стоимость поездки составляет: " + o.price + " zł";
    }
  });
};

/* ================= DRIVER ================= */
function trackDriver(id){
  onValue(ref(db,'drivers/'+id+'/coords'), snap=>{
    const c = snap.val();
    if (!c) return;

    if (!window.driverMarker) {
      const el = document.createElement('div');
      el.innerHTML = "🚕";
      el.style.fontSize = "30px";
      window.driverMarker = new maplibregl.Marker(el).setLngLat(c).addTo(map);
    } else {
      window.driverMarker.setLngLat(c);
    }
  });
}

/* ================= DIST ================= */
function getDist(a,b){
  const R=6371;
  const dLat=(b[1]-a[1])*Math.PI/180;
  const dLon=(b[0]-a[0])*Math.PI/180;
  return R*2*Math.atan2(
    Math.sqrt(Math.sin(dLat/2)**2),
    Math.sqrt(1-Math.sin(dLat/2)**2)
  );
}

/* ================= TIMER ================= */
let searchTimer = null;

function startSearchTimer(){
  clearTimeout(searchTimer);

  searchTimer = setTimeout(()=>{
    document.getElementById('timeoutModal').style.display = 'flex';
  },60000);
}

/* ================= MODAL ================= */
document.getElementById('continueSearch').onclick = () => {
  document.getElementById('timeoutModal').style.display = 'none';
  sendOrderToFirebase();
};

document.getElementById('cancelSearch').onclick = async () => {
  document.getElementById('timeoutModal').style.display = 'none';

  if (currentOrderId) {
    await remove(ref(db,'orders/'+currentOrderId));
    currentOrderId = null;
  }

  window.isOrderPending = false;
};

/* ================= RESTORE (ONLY ACTIVE ORDER) ================= */
window.restoreOrder = async function () {
  try {
    const snap = await get(ref(db,'orders'));
    const orders = snap.val();
    if (!orders) return;

    const active = Object.entries(orders).find(([id,o]) =>
      o.status === "searching" || o.status === "accepted"
    );

    if (!active) return;

    const [id, order] = active;
    currentOrderId = id;

    from = order.from;
    to = order.to;
    customPrice = order.price;

    document.getElementById('finalPriceText').innerText =
      "Стоимость поездки составляет: " + order.price + " zł";

    if (order.status === "searching") {
      window.isOrderPending = true;
      startSearchTimer();
    }

    if (order.status === "accepted") {
      window.isOrderPending = true;
      trackDriver(order.assignedDriverId);
    }

    setTimeout(()=>build(),1000);

  } catch(e){}
};

/* ================= INIT RESTORE ================= */
setTimeout(()=>window.restoreOrder(),800);

</script>

</body>
</html>
