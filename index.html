<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Taxi Stable v14 FIREBASE (Memory & Fixes)</title>

<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#f1c40f">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<meta name="apple-mobile-web-app-title" content="Taxi App">
<link rel="apple-touch-icon" href="https://cdn-icons-png.flaticon.com/512/71/71222.png">

<script src="https://unpkg.com/maplibre-gl@3.6.2/dist/maplibre-gl.js"></script>
<link href="https://unpkg.com/maplibre-gl@3.6.2/dist/maplibre-gl.css" rel="stylesheet"/>

<style>
body { margin:0; font-family:sans-serif; }
#map { width:100%; height:100vh; }

/* START */
.start {
position:fixed; inset:0;
background:white;
display:flex;
justify-content:center;
align-items:center;
z-index:1000;
}

.box { width:300px; }

.input {
width:100%;
padding:12px;
margin-bottom:10px;
border-radius:10px;
border:1px solid #ddd;
}

.btn {
width:100%;
padding:12px;
border:none;
border-radius:10px;
background:#f1c40f;
font-weight:bold;
cursor:pointer;
}

.error {
color:red;
font-size:12px;
display:none;
margin-top:-5px;
margin-bottom:8px;
}

/* SEARCH */
.top {
position:absolute;
top:15px;
left:10px;
width:320px;
z-index:10;
}

.box2 {
background:white;
padding:10px;
border-radius:15px;
box-shadow:0 4px 15px rgba(0,0,0,0.1);
}

.input2 {
width:100%;
padding:10px;
border-radius:10px;
border:1px solid #eee;
margin-bottom:6px;
}

.suggest {
background:white;
max-height:180px;
overflow:auto;
border-radius:10px;
box-shadow:0 4px 10px rgba(0,0,0,0.15);
}

.item {
padding:10px;
cursor:pointer;
border-bottom:1px solid #eee;
}
.item:hover { background:#f1f1f1; }

/* PANEL */
.panel {
position:absolute;
bottom:20px;
left:10px;
width:320px;
background:white;
padding:12px;
border-radius:15px;
display:none;
z-index:20;
box-shadow:0 4px 15px rgba(0,0,0,0.1);
}

.row {
display:flex;
gap:10px;
margin-top:10px;
}

.btn2 {
flex:1;
padding:12px;
border:none;
border-radius:10px;
font-weight:bold;
cursor:pointer;
}

.order { background:#f1c40f; }
.price { background:#e74c3c; color:white; }

/* MODAL */
.modal {
position:fixed;
inset:0;
background:rgba(0,0,0,0.5);
display:none;
justify-content:center;
align-items:center;
z-index:9999;
}

.modal-content {
background:white;
padding:20px;
border-radius:15px;
width:300px;
}

.field {
width:100%;
padding:10px;
margin-bottom:10px;
border-radius:10px;
border:1px solid #ddd;
}

/* 2D / 3D */
.ctrl {
position:absolute;
right:10px;
top:120px;
z-index:10;
display:flex;
flex-direction:column;
gap:8px;
}

.ctrl button {
background:white;
border:none;
padding:10px;
border-radius:8px;
cursor:pointer;
box-shadow:0 2px 8px rgba(0,0,0,0.2);
}

/* Стили для кнопок отмены и загрузки */
.btn-cancel { background: #e74c3c; color: white; margin-top: 10px; }
.loader { border: 3px solid #f3f3f3; border-top: 3px solid #f1c40f; border-radius: 50%; width: 20px; height: 20px; animation: spin 1s linear infinite; display: inline-block; vertical-align: middle; margin-right: 8px; }
@keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(3600deg); } }
</style>
</head>

<body>

<div id="driver-status" style="display:none; position:absolute; top:80px; left:50%; transform:translateX(-50%); background:rgba(0,0,0,0.8); color:white; padding:10px 20px; border-radius:20px; z-index:1000; text-align:center; box-shadow:0 4px 10px rgba(0,0,0,0.2); width: 80%; max-width: 300px;"></div>

<div class="start" id="start">
    <div class="box">
        <h3>Данные</h3>
        <input id="name" class="input" placeholder="Имя">
        <div style="display:flex; gap:6px; align-items:center;">
            <span style="font-weight:bold;">+48</span>
            <input id="phone" class="input" placeholder="9 цифр" inputmode="numeric">
        </div>
        <div class="error" id="phoneError">Неверный номер</div>
        <button class="btn" id="startBtn">Начать</button>
    </div>
</div>

<div id="map"></div>

<div class="top" id="top-search">
    <div class="box2">
        <input id="from" class="input2" placeholder="Откуда">
        <input id="to" class="input2" placeholder="Куда">
        <div class="suggest" id="suggest"></div>
    </div>
</div>

<div class="panel" id="panel">
    <div>Имя: <b id="outName"></b></div>
    <div>Телефон: <b id="outPhone"></b></div>
    <hr>
    <div>Км: <b id="km"></b></div>
    <div>Мин: <b id="min"></b></div>
    <div>Цена: <b id="price"></b> zł</div>
    <div class="row">
        <button class="btn2 price" id="custom">Своя цена</button>
        <button class="btn2 order" id="orderBtn">Заказать</button>
    </div>
</div>

<div class="modal" id="modal">
    <div class="modal-content">
        <h3>Своя цена</h3>
        <div>Минимум: <b id="minPrice"></b> zł</div>
        <input id="priceInput" class="field" type="number">
        <input id="priceSlider" class="field" type="range">
        <select id="reason" class="field">
            <option>Спешу</option>
            <option>На работу</option>
            <option>На автобус</option>
            <option>Другое</option>
        </select>
        <button id="submitPrice" class="btn2 order">OK</button>
    </div>
</div>

<div class="modal" id="modal-timeout">
    <div class="modal-content" style="text-align:center;">
        <div style="font-size: 50px; margin-bottom: 10px;">⏳</div>
        <h3>Водитель не найден</h3>
        <p>Продолжить поиск или отменить заказ?</p>
        <div class="row">
            <button class="btn2" id="timeout-cancel" style="background:#eee; color:#333;">Отменить</button>
            <button class="btn2 order" id="timeout-continue">Продолжить</button>
        </div>
    </div>
</div>

<div class="ctrl">
    <button id="btn2d">2D</button>
    <button id="btn3d">3D</button>
</div>

<script type="module">
  import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
  import { getDatabase, ref, push, set, get, onValue, remove } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-database.js";

  const firebaseConfig = {
    apiKey: "AIzaSyAf-9-A72oCswBCQIilwuE6FEYt_MN2PbU",
    authDomain: "taxi-app-41298.firebaseapp.com",
    databaseURL: "https://taxi-app-41298-default-rtdb.europe-west1.firebasedatabase.app",
    projectId: "taxi-app-41298",
    storageBucket: "taxi-app-41298.firebasestorage.app",
    messagingSenderId: "1011260164934",
    appId: "1:1011260164934:web:1972a0315325b3f5d3b347",
    measurementId: "G-85C77DBC57"
  };

  const app = initializeApp(firebaseConfig);
  const db = getDatabase(app);

  let currentOrderId = localStorage.getItem('activeOrderId'); // ДОБАВЛЕНО: Чтение из памяти
  let rejectedDrivers = [];
  let searchTimer = null;
  const alertSound = new Audio('https://actions.google.com/sounds/v1/alarms/beep_short.ogg');
  window.isOrderPending = false; // Флаг блокировки карты

  function getDist(c1, c2) {
      const R = 6371;
      const dLat = (c2[1]-c1[1])*Math.PI/180;
      const dLon = (c2[0]-c1[0])*Math.PI/180;
      const a = Math.sin(dLat/2)**2 + Math.cos(c1[1]*Math.PI/180)*Math.cos(c2[1]*Math.PI/180)*Math.sin(dLon/2)**2;
      return R * 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1-a));
  }

  function showStatus(text, showCancel = false) {
      const el = document.getElementById('driver-status');
      if (text) { 
          el.innerHTML = text; 
          if(showCancel) {
              el.innerHTML += `<br><button class="btn btn-cancel" id="cancelOrderAction">Отменить заказ</button>`;
              setTimeout(() => {
                const btn = document.getElementById('cancelOrderAction');
                if(btn) btn.onclick = () => window.resetOrderUI();
              }, 100);
          }
          el.style.display = 'block'; 
      }
      else { el.style.display = 'none'; }
  }

  window.resetOrderUI = async function() {
      clearTimeout(searchTimer);
      searchTimer = null;
      window.isOrderPending = false; // Разблокировка карты
      if(currentOrderId) {
          await remove(ref(db, `orders/${currentOrderId}`));
          localStorage.removeItem('activeOrderId'); // Очистка памяти
          currentOrderId = null;
      }
      rejectedDrivers = [];
      showStatus("");
      document.getElementById('panel').style.display = 'block';
      document.getElementById('top-search').style.pointerEvents = 'auto';
      document.getElementById('top-search').style.opacity = '1';
  };

  window.trackDriver = function(driverId) {
      onValue(ref(db, `drivers/${driverId}/coords`), (snap) => {
          const coords = snap.val();
          if (!coords || !window.map) return;
          
          if (!window.driverMarker) {
              const el = document.createElement('div');
              el.innerText = '🚕';
              el.style.fontSize = '32px';
              window.driverMarker = new maplibregl.Marker(el).setLngLat(coords).addTo(window.map);
          } else {
              window.driverMarker.setLngLat(coords);
          }
          
          if (getDist(coords, window.clientCoords) < 0.4) {
              showStatus("<b>Такси подъезжает!</b><br>Пожалуйста, выходите.");
              alertSound.play().catch(()=>{});
          }
      });
  };

  window.sendOrderToFirebase = async function() {
    window.isOrderPending = true; // Блокировка карты
    const name = document.getElementById('name').value;
    const phoneVal = document.getElementById('phone').value;
    
    document.getElementById('panel').style.display = 'none';
    document.getElementById('top-search').style.pointerEvents = 'none';
    document.getElementById('top-search').style.opacity = '0.5';
    showStatus(`<div class="loader"></div> Ищем ближайшую машину...`, true);

    if(!searchTimer) {
        searchTimer = setTimeout(() => {
            document.getElementById('modal-timeout').style.display = 'flex';
        }, 60000);
    }

    const driversSnap = await get(ref(db, 'drivers'));
    const drivers = driversSnap.val();

    if (!drivers || !window.clientCoords) {
        alert("Нет свободных водителей.");
        window.resetOrderUI();
        return;
    }

    let nearest = Object.keys(drivers)
        .map(id => ({id, ...drivers[id]}))
        .filter(d => d.status === 'online' && !rejectedDrivers.includes(d.id))
        .map(d => ({...d, dist: getDist(window.clientCoords, d.coords)}))
        .sort((a,b) => a.dist - b.dist)[0];

    if (!nearest) {
        document.getElementById('modal-timeout').style.display = 'flex'; // Если нет никого, сразу показываем окно
        return;
    }

    const orderData = {
        clientName: name,
        clientPhone: "+48" + phoneVal,
        fromAddress: document.getElementById('from').value,
        toAddress: document.getElementById('to').value,
        clientCoords: window.clientCoords,
        destCoords: window.destCoords, // ДОБАВЛЕНО для восстановления
        distance: document.getElementById('km').innerText,
        duration: document.getElementById('min').innerText,
        price: window.customPrice || window.minPrice,
        status: "searching",
        assignedDriverId: nearest.id,
        createdAt: Date.now()
    };

    try {
        if (!currentOrderId) {
            const newOrderRef = push(ref(db, 'orders'));
            currentOrderId = newOrderRef.key;
            localStorage.setItem('activeOrderId', currentOrderId); // Запоминаем заказ
        }
        
        await set(ref(db, 'orders/' + currentOrderId), orderData);
        showStatus(`<div class="loader"></div> Предлагаем заказ водителю: ${nearest.name}...`, true);
        
        onValue(ref(db, 'orders/' + currentOrderId), (snap) => {
            const order = snap.val();
            if (!order) return;
            
            if (order.status === 'rejected') {
                rejectedDrivers.push(order.assignedDriverId);
                window.sendOrderToFirebase(); 
            }
            
            if (order.status === 'accepted') {
                clearTimeout(searchTimer);
                searchTimer = null;
                showStatus(`<b>Водитель принял заказ!</b><br>Машина выехала к вам.`);
                window.trackDriver(order.assignedDriverId);
            }
        });

    } catch (e) {
        alert("Ошибка: " + e.message);
        window.resetOrderUI();
    }
  };

  // Проверка и восстановление активного заказа при загрузке
  window.checkActiveOrder = async function() {
      if (!currentOrderId) return;
      const snap = await get(ref(db, `orders/${currentOrderId}`));
      const order = snap.val();
      
      if (order && (order.status === 'searching' || order.status === 'accepted')) {
          window.isOrderPending = true;
          document.getElementById('top-search').style.pointerEvents = 'none';
          document.getElementById('top-search').style.opacity = '0.5';
          
          if(window.restoreRoute) {
              window.restoreRoute(order.clientCoords, order.destCoords, order.fromAddress, order.toAddress);
          }
          
          if(order.status === 'searching') {
              showStatus(`<div class="loader"></div> Поиск продолжается...`, true);
              searchTimer = setTimeout(() => { document.getElementById('modal-timeout').style.display = 'flex'; }, 60000);
          } else {
              showStatus(`<b>Водитель принял заказ!</b><br>Машина выехала к вам.`);
              window.trackDriver(order.assignedDriverId);
          }
      } else {
          localStorage.removeItem('activeOrderId');
          currentOrderId = null;
      }
  };

  // Обработчики кнопок красивого модального окна
  document.getElementById('timeout-continue').onclick = () => {
      document.getElementById('modal-timeout').style.display = 'none';
      clearTimeout(searchTimer);
      searchTimer = null;
      window.sendOrderToFirebase();
  };
  document.getElementById('timeout-cancel').onclick = () => {
      document.getElementById('modal-timeout').style.display = 'none';
      window.resetOrderUI();
  };
</script>

<script>
let map;
let from=null;
let to=null;
let minPrice=0;
let activeInput=null;
let customPrice=0;
let destMarker;

const phone=document.getElementById('phone');
phone.addEventListener('input',()=>{
    phone.value=phone.value.replace(/\D/g,'').slice(0,9);
});

// Инициализация карты и логики (вынесена в отдельную функцию для Авто-входа)
function initApp() {
    document.getElementById('start').style.display='none';

    map=new maplibregl.Map({
        container:'map',
        style:'https://api.maptiler.com/maps/streets-v4/style.json?key=umzJGOnUyr8Edm12MN9b',
        center:[21.01,52.23],
        zoom:13,
        pitch:45
    });

    map.addControl(new maplibregl.NavigationControl());
    const userMarker=new maplibregl.Marker({color:'blue'});
    destMarker = new maplibregl.Marker({color:'red', draggable:true});

    map.on('load
