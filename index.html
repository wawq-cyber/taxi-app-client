<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Taxi Stable v15 FIREBASE + Live Restore</title>

<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#f1c40f">
<script src="https://unpkg.com/maplibre-gl@3.6.2/dist/maplibre-gl.js"></script>
<link href="https://unpkg.com/maplibre-gl@3.6.2/dist/maplibre-gl.css" rel="stylesheet"/>

<style>
body { margin:0; font-family:sans-serif; }
#map { width:100%; height:100vh; }
.start { position:fixed; inset:0; background:white; display:flex; justify-content:center; align-items:center; z-index:1000; }
.box { width:300px; }
.input { width:100%; padding:12px; margin-bottom:10px; border-radius:10px; border:1px solid #ddd; box-sizing: border-box; }
.btn { width:100%; padding:12px; border:none; border-radius:10px; background:#f1c40f; font-weight:bold; cursor:pointer; }
.error { color:red; font-size:12px; display:none; margin-top:-5px; margin-bottom:8px; }
.top { position:absolute; top:15px; left:10px; width:320px; z-index:10; transition: opacity 0.3s; }
.box2 { background:white; padding:10px; border-radius:15px; box-shadow:0 4px 15px rgba(0,0,0,0.1); }
.input2 { width:100%; padding:10px; border-radius:10px; border:1px solid #eee; margin-bottom:6px; box-sizing: border-box; }
.suggest { background:white; max-height:180px; overflow:auto; border-radius:10px; box-shadow:0 4px 10px rgba(0,0,0,0.15); }
.item { padding:10px; cursor:pointer; border-bottom:1px solid #eee; }
.panel { position:absolute; bottom:20px; left:10px; width:320px; background:white; padding:12px; border-radius:15px; display:none; z-index:20; box-shadow:0 4px 15px rgba(0,0,0,0.1); }
.row { display:flex; gap:10px; margin-top:10px; }
.btn2 { flex:1; padding:12px; border:none; border-radius:10px; font-weight:bold; cursor:pointer; }
.order { background:#f1c40f; }
.price { background:#e74c3c; color:white; }
.modal { position:fixed; inset:0; background:rgba(0,0,0,0.5); display:none; justify-content:center; align-items:center; z-index:9999; }
.modal-content { background:white; padding:20px; border-radius:15px; width:300px; }
.field { width:100%; padding:10px; margin-bottom:10px; border-radius:10px; border:1px solid #ddd; box-sizing: border-box; }
.ctrl { position:absolute; right:10px; top:120px; z-index:10; display:flex; flex-direction:column; gap:8px; }
.ctrl button { background:white; border:none; padding:10px; border-radius:8px; cursor:pointer; box-shadow:0 2px 8px rgba(0,0,0,0.2); }
.btn-cancel { background: #e74c3c; color: white; margin-top: 10px; width: 100%; }
.loader { border: 3px solid #f3f3f3; border-top: 3px solid #f1c40f; border-radius: 50%; width: 18px; height: 18px; animation: spin 1s linear infinite; display: inline-block; vertical-align: middle; margin-right: 8px; }
@keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
</style>
</head>

<body>

<div id="driver-status" style="display:none; position:absolute; top:80px; left:50%; transform:translateX(-50%); background:rgba(0,0,0,0.8); color:white; padding:15px 25px; border-radius:20px; z-index:1000; text-align:center; box-shadow:0 4px 15px rgba(0,0,0,0.3); width: 80%; max-width: 320px;"></div>

<div class="start" id="start">
    <div class="box">
        <h3>Данные</h3>
        <input id="name" class="input" placeholder="Имя">
        <div style="display:flex; gap:6px; align-items:center;">
            <span style="font-weight:bold;">+48</span>
            <input id="phone" class="input" placeholder="9 цифр" inputmode="numeric">
        </div>
        <div class="error" id="phoneError">Неверный номер</div>
        <button class="btn" id="startBtn">Начать</button>
    </div>
</div>

<div id="map"></div>

<div class="top" id="top-search">
    <div class="box2">
        <input id="from" class="input2" placeholder="Откуда">
        <input id="to" class="input2" placeholder="Куда">
        <div class="suggest" id="suggest"></div>
    </div>
</div>

<div class="panel" id="panel">
    <div>Имя: <b id="outName"></b></div>
    <div>Телефон: <b id="outPhone"></b></div>
    <hr>
    <div>Км: <b id="km"></b></div>
    <div>Мин: <b id="min"></b></div>
    <div>Цена: <b id="price"></b> zł</div>
    <div class="row">
        <button class="btn2 price" id="custom">Своя цена</button>
        <button class="btn2 order" id="orderBtn">Заказать</button>
    </div>
</div>

<div class="modal" id="modal">
    <div class="modal-content">
        <h3>Своя цена</h3>
        <div>Минимум: <b id="minPrice"></b> zł</div>
        <input id="priceInput" class="field" type="number">
        <input id="priceSlider" class="field" type="range">
        <select id="reason" class="field">
            <option>Спешу</option>
            <option>На работу</option>
            <option>На автобус</option>
            <option>Другое</option>
        </select>
        <button id="submitPrice" class="btn2 order">OK</button>
    </div>
</div>

<div class="modal" id="modal-timeout">
    <div class="modal-content" style="text-align:center;">
        <div style="font-size: 50px; margin-bottom: 10px;">⏳</div>
        <h3>Водитель не найден</h3>
        <div class="row">
            <button class="btn2" id="timeout-cancel" style="background:#eee;">Отменить</button>
            <button class="btn2 order" id="timeout-continue">Продолжить</button>
        </div>
    </div>
</div>

<div class="ctrl">
    <button id="btn2d">2D</button>
    <button id="btn3d">3D</button>
</div>

<script type="module">
  import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
  import { getDatabase, ref, push, set, get, onValue, remove } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-database.js";

  const firebaseConfig = {
    apiKey: "AIzaSyAf-9-A72oCswBCQIilwuE6FEYt_MN2PbU",
    authDomain: "taxi-app-41298.firebaseapp.com",
    databaseURL: "https://taxi-app-41298-default-rtdb.europe-west1.firebasedatabase.app",
    projectId: "taxi-app-41298",
    storageBucket: "taxi-app-41298.firebasestorage.app",
    messagingSenderId: "1011260164934",
    appId: "1:1011260164934:web:1972a0315325b3f5d3b347",
    measurementId: "G-85C77DBC57"
  };

  const app = initializeApp(firebaseConfig);
  const db = getDatabase(app);

  let currentOrderId = localStorage.getItem('activeOrderId');
  let rejectedDrivers = [];
  let searchTimer = null;
  const alertSound = new Audio('https://actions.google.com/sounds/v1/alarms/beep_short.ogg');

  function getDist(c1, c2) {
      const R = 6371;
      const dLat = (c2[1]-c1[1])*Math.PI/180;
      const dLon = (c2[0]-c1[0])*Math.PI/180;
      const a = Math.sin(dLat/2)**2 + Math.cos(c1[1]*Math.PI/180)*Math.cos(c2[1]*Math.PI/180)*Math.sin(dLon/2)**2;
      return R * 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1-a));
  }

  window.showStatus = function(text, showCancel = false) {
      const el = document.getElementById('driver-status');
      if (text) { 
          el.innerHTML = text; 
          if(showCancel) {
              el.innerHTML += `<br><button class="btn btn-cancel" id="cancelOrderAction">Отменить поиск</button>`;
              setTimeout(() => {
                const btn = document.getElementById('cancelOrderAction');
                if(btn) btn.onclick = () => window.resetOrderUI();
              }, 100);
          }
          el.style.display = 'block'; 
      } else { el.style.display = 'none'; }
  }

  window.resetOrderUI = async function() {
      clearTimeout(searchTimer); searchTimer = null;
      window.isOrderPending = false; 
      if(currentOrderId) { await remove(ref(db, `orders/${currentOrderId}`)); }
      currentOrderId = null;
      localStorage.removeItem('activeOrderId');
      rejectedDrivers = [];
      window.showStatus("");
      document.getElementById('panel').style.display = 'block';
      document.getElementById('top-search').style.pointerEvents = 'auto';
      document.getElementById('top-search').style.opacity = '1';
  };

  // Проверка активной сессии при старте
  window.checkActiveSession = async function() {
      if(!currentOrderId) return false;
      const snap = await get(ref(db, `orders/${currentOrderId}`));
      const order = snap.val();
      if(order && (order.status === 'searching' || order.status === 'accepted')) {
          // Восстанавливаем данные в UI
          document.getElementById('name').value = order.clientName || "";
          document.getElementById('phone').value = (order.clientPhone || "").replace("+48", "");
          document.getElementById('from').value = order.fromAddress;
          document.getElementById('to').value = order.toAddress;
          window.clientCoords = order.clientCoords;
          window.customPrice = order.price;
          
          // Запускаем процесс отображения заказа
          window.startOrderTracking(order);
          return true;
      } else {
          localStorage.removeItem('activeOrderId');
          currentOrderId = null;
          return false;
      }
  };

  window.startOrderTracking = function(order) {
      window.isOrderPending = true;
      document.getElementById('start').style.display = 'none';
      document.getElementById('panel').style.display = 'none';
      document.getElementById('top-search').style.opacity = '0.5';
      document.getElementById('top-search').style.pointerEvents = 'none';

      if(order.status === 'searching') {
          window.showStatus(`<div class="loader"></div> Поиск машины...<br><div style="margin-top:10px; font-size:14px; color:#f1c40f;">Стоимость: <b>${order.price} zł</b></div>`, true);
      } else {
          window.showStatus(`<b>Водитель в пути</b><br>Стоимость: ${order.price} zł`);
          window.trackDriver(order.assignedDriverId);
      }

      onValue(ref(db, 'orders/' + currentOrderId), (snap) => {
          const o = snap.val();
          if (!o) return;
          if (o.status === 'rejected') { rejectedDrivers.push(o.assignedDriverId); window.sendOrderToFirebase(); }
          if (o.status === 'accepted') {
              clearTimeout(searchTimer);
              window.showStatus(`<b>Водитель принял заказ!</b><br>Стоимость: ${o.price} zł`);
              window.trackDriver(o.assignedDriverId);
          }
      });
  };

  window.trackDriver = function(driverId) {
      onValue(ref(db, `drivers/${driverId}/coords`), (snap) => {
          const coords = snap.val();
          if (!coords || !window.map) return;
          if (!window.driverMarker) {
              const el = document.createElement('div'); el.innerText = '🚕'; el.style.fontSize = '32px';
              window.driverMarker = new maplibregl.Marker(el).setLngLat(coords).addTo(window.map);
          } else { window.driverMarker.setLngLat(coords); }
      });
  };

  window.sendOrderToFirebase = async function() {
    const price = window.customPrice || window.minPrice;
    window.isOrderPending = true; 
    
    // Эффект 3D и уменьшение карты
    if(window.map && window.clientCoords && window.toCoords) {
        window.map.fitBounds([window.clientCoords, window.toCoords], {padding: 100});
        window.map.easeTo({pitch: 60, duration: 1000});
    }

    window.showStatus(`<div class="loader"></div> Поиск машины...<br><div style="margin-top:10px; font-size:14px; color:#f1c40f;">Стоимость поездки составляет: <b>${price} zł</b></div>`, true);

    if(!searchTimer) {
        searchTimer = setTimeout(() => {
            if (currentOrderId) {
                get(ref(db, 'orders/' + currentOrderId)).then(s => {
                    if (s.val() && s.val().status === 'searching') document.getElementById('modal-timeout').style.display = 'flex';
                });
            }
        }, 60000); // 60 секунд
    }

    const driversSnap = await get(ref(db, 'drivers'));
    const drivers = driversSnap.val();
    let nearest = drivers ? Object.keys(drivers).map(id => ({id, ...drivers[id]}))
        .filter(d => d.status === 'online' && !rejectedDrivers.includes(d.id))
        .map(d => ({...d, dist: getDist(window.clientCoords, d.coords)}))
        .sort((a,b) => a.dist - b.dist)[0] : null;

    if (!nearest) { document.getElementById('modal-timeout').style.display = 'flex'; return; }

    const orderData = {
        clientName: document.getElementById('name').value,
        clientPhone: "+48" + document.getElementById('phone').value,
        fromAddress: document.getElementById('from').value,
        toAddress: document.getElementById('to').value,
        clientCoords: window.clientCoords,
        toCoords: window.toCoords,
        distance: document.getElementById('km').innerText,
        price: price,
        status: "searching",
        assignedDriverId: nearest.id,
        createdAt: Date.now()
    };

    if (!currentOrderId) {
        const n = push(ref(db, 'orders'));
        currentOrderId = n.key;
        localStorage.setItem('activeOrderId', currentOrderId);
    }
    await set(ref(db, 'orders/' + currentOrderId), orderData);
    window.startOrderTracking(orderData);
  };

  document.getElementById('timeout-continue').onclick = () => { document.getElementById('modal-timeout').style.display = 'none'; window.sendOrderToFirebase(); };
  document.getElementById('timeout-cancel').onclick = () => { document.getElementById('modal-timeout').style.display = 'none'; window.resetOrderUI(); };
</script>

<script>
let map; let from=null; let to=null; let minPrice=0; let customPrice=0; let destMarker;
window.isOrderPending = false; 

window.addEventListener('load', async () => {
    // Ждем инициализации firebase скрипта через небольшую паузу
    setTimeout(async () => {
        const hasSession = await window.checkActiveSession();
        if(hasSession) {
            initMap(true);
        }
    }, 500);
});

document.getElementById('startBtn').onclick=()=>initMap(false);

function initMap(isRestore) {
    if(map) return;
    if(!isRestore && (!document.getElementById('name').value.trim() || document.getElementById('phone').value.length!==9)){
        document.getElementById('phoneError').style.display='block'; return;
    }
    document.getElementById('start').style.display='none';
    map=new maplibregl.Map({ container:'map', style:'https://api.maptiler.com/maps/streets-v4/style.json?key=umzJGOnUyr8Edm12MN9b', center:[21.01,52.23], zoom:13, pitch:45 });
    map.addControl(new maplibregl.NavigationControl());
    
    const userMarker=new maplibregl.Marker({color:'blue'});
    destMarker = new maplibregl.Marker({color:'red', draggable:true});
    
    map.on('load', async () => { 
        userMarker.addTo(map); 
        window.map = map;
        if(isRestore) {
            from = window.clientCoords;
            userMarker.setLngLat(from);
            // Восстанавливаем "Куда" если оно было
            const snap = await fetch(`https://api.maptiler.com/geocoding/${from[0]},${from[1]}.json?key=umzJGOnUyr8Edm12MN9b`);
            build(); 
        } else {
            navigator.geolocation.getCurrentPosition(async p=>{
                from=[p.coords.longitude,p.coords.latitude]; window.clientCoords = from;
                userMarker.setLngLat(from); map.flyTo({center:from,zoom:15});
                document.getElementById('from').value = await reverse(from);
            });
        }
    });

    map.on('click',async e=>{
        if(window.isOrderPending) return;
        to=[e.lngLat.lng,e.lngLat.lat]; window.toCoords = to;
        destMarker.setLngLat(to).addTo(map); document.getElementById('to').value=await reverse(to); build();
    });
}

async function reverse(c){
    const r=await fetch(`https://api.maptiler.com/geocoding/${c[0]},${c[1]}.json?key=umzJGOnUyr8Edm12MN9b`);
    const d=await r.json(); return d.features?.[0]?.place_name||'';
}

async function build(){
    if(!from||!to) {
        // Если при восстановлении нет 'to', пытаемся получить его из UI
        const toVal = document.getElementById('to').value;
        if(!toVal) return;
        const r = await fetch(`https://api.maptiler.com/geocoding/${encodeURIComponent(toVal)}.json?key=umzJGOnUyr8Edm12MN9b&limit=1`);
        const d = await r.json();
        if(d.features[0]) { to = d.features[0].center; window.toCoords = to; } else return;
    }
    const r=await fetch(`https://router.project-osrm.org/route/v1/driving/${from[0]},${from[1]};${to[0]},${to[1]}?overview=full&geometries=geojson`);
    const d=await r.json(); const route=d.routes[0];
    const km=(route.distance/1000).toFixed(1); 
    minPrice=Math.round(km*2.5+10);
    
    document.getElementById('panel').style.display = window.isOrderPending ? 'none' : 'block';
    document.getElementById('km').innerText=km;
    document.getElementById('min').innerText=Math.round(route.duration/60);
    if (!customPrice || customPrice < minPrice) customPrice = minPrice;
    document.getElementById('price').innerText=customPrice;

    if(map.getSource('route')){ map.getSource('route').setData(route.geometry); }
    else{ map.addSource('route',{type:'geojson',data:route.geometry});
          map.addLayer({ id:'route', type:'line', source:'route', paint:{'line-color':'#f1c40f','line-width':5} }); }
    destMarker.setLngLat(to).addTo(map); map.fitBounds([from,to],{padding:80});
}

document.getElementById('custom').onclick=()=>{
    document.getElementById('modal').style.display='flex';
    document.getElementById('minPrice').innerText=minPrice;
    document.getElementById('priceInput').value=customPrice;
    document.getElementById('priceSlider').min=minPrice;
    document.getElementById('priceSlider').max=minPrice*5;
    document.getElementById('priceSlider').value=customPrice;
};

document.getElementById('priceSlider').oninput = (e) => { document.getElementById('priceInput').value = e.target.value; };
document.getElementById('submitPrice').onclick = () => {
    let val = parseInt(document.getElementById('priceInput').value);
    if (isNaN(val) || val < minPrice) val = minPrice;
    customPrice = val; window.customPrice = val;
    document.getElementById('price').innerText = val;
    document.getElementById('modal').style.display = 'none';
};

document.getElementById('orderBtn').onclick=()=>{ window.sendOrderToFirebase(); };
document.getElementById('btn2d').onclick=()=>map.easeTo({pitch:0,bearing:0});
document.getElementById('btn3d').onclick=()=>map.easeTo({pitch:60,bearing:-20});

setInterval(() => { window.map = map; window.clientCoords = from; window.customPrice = customPrice; window.minPrice = minPrice; }, 500);
</script>
</body>
</html>
