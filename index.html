<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Taxi v15 FIXED FULL</title>

<script src="https://unpkg.com/maplibre-gl@3.6.2/dist/maplibre-gl.js"></script>
<link href="https://unpkg.com/maplibre-gl@3.6.2/dist/maplibre-gl.css" rel="stylesheet"/>

<style>
body{margin:0;font-family:sans-serif;}
#map{width:100%;height:100vh;}

.start{position:fixed;inset:0;background:#fff;display:flex;justify-content:center;align-items:center;z-index:9999;}
.box{width:300px;}
.input{width:100%;padding:10px;margin:5px 0;border:1px solid #ddd;border-radius:8px;}
.btn{width:100%;padding:12px;background:#f1c40f;border:none;font-weight:bold;border-radius:10px;}

.top{position:absolute;top:10px;left:10px;width:300px;z-index:10;}
.panel{position:absolute;bottom:20px;left:10px;background:#fff;padding:12px;border-radius:12px;width:300px;z-index:10;}

.suggest{background:#fff;max-height:180px;overflow:auto;}
.item{padding:8px;cursor:pointer;}
.item:hover{background:#eee;}

.modal{position:fixed;inset:0;background:rgba(0,0,0,.5);display:none;align-items:center;justify-content:center;z-index:9999;}
.modal-box{background:#fff;padding:20px;width:300px;}

.map-small{height:80vh !important;}

.status{
position:absolute;top:80px;left:50%;transform:translateX(-50%);
background:rgba(0,0,0,.8);color:#fff;padding:10px 15px;border-radius:10px;z-index:9999;
}
</style>
</head>

<body>

<div id="driver-status" class="status" style="display:none"></div>

<div class="start" id="start">
  <div class="box">
    <input id="name" class="input" placeholder="Имя">
    <input id="phone" class="input" placeholder="Телефон (9 цифр)">
    <button class="btn" id="startBtn">Начать</button>
  </div>
</div>

<div id="map"></div>

<div class="top">
  <input id="from" class="input" placeholder="Откуда">
  <input id="to" class="input" placeholder="Куда">
  <div id="suggest" class="suggest"></div>
</div>

<div class="panel">
<div>Цена: <b id="price">0</b> zł</div>
<button class="btn" id="order">Заказать</button>
</div>

<div class="modal" id="modal">
<div class="modal-box">
<input id="priceInput" class="input">
<input id="priceSlider" type="range">
<button class="btn" id="ok">OK</button>
</div>
</div>

<div class="modal" id="timeoutModal">
<div class="modal-box" style="text-align:center">
<h3>Водитель не найден</h3>
<p>Продолжить поиск?</p>
<button class="btn" id="continue">Продолжить</button>
<button class="btn" id="cancel">Отменить</button>
</div>
</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
import { getDatabase, ref, set, push, get, onValue, remove } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-database.js";

const app = initializeApp({
  apiKey:"AIza...",
  databaseURL:"https://taxi-app.firebaseio.com"
});
const db = getDatabase(app);

/* ================= STATE ================= */
const S = {
  map:null,
  from:null,
  to:null,
  price:0,
  minPrice:0,
  orderId:null,
  timer:null,
  active:false
};

/* ================= INIT ================= */
window.addEventListener('DOMContentLoaded', init);

function init(){
  bindUI();
  initMap();
  restore();
}

/* ================= MAP ================= */
function initMap(){
  S.map = new maplibregl.Map({
    container:'map',
    style:'https://api.maptiler.com/maps/streets-v2/style.json?key=demo',
    center:[21,52],
    zoom:12
  });
}

/* ================= UI ================= */
function bindUI(){

const phone=document.getElementById('phone');
phone.addEventListener('input',e=>{
  e.target.value = e.target.value.replace(/\D/g,'').slice(0,9);
});

document.getElementById('startBtn').onclick=()=>{
  document.getElementById('start').style.display='none';
};

document.getElementById('from').oninput=e=>search(e.target.value,'from');
document.getElementById('to').oninput=e=>search(e.target.value,'to');

document.getElementById('order').onclick=sendOrder;

document.getElementById('ok').onclick=()=>{
  S.price = Math.max(S.price,S.minPrice);
  document.getElementById('modal').style.display='none';
};

document.getElementById('priceSlider').oninput=e=>{
  S.price = Math.min(Number(e.target.value),S.minPrice*5);
  document.getElementById('priceInput').value=S.price;
};

document.getElementById('continue').onclick=()=>{
  document.getElementById('timeoutModal').style.display='none';
  sendOrder();
};

document.getElementById('cancel').onclick=()=>{
  if(S.orderId) remove(ref(db,'orders/'+S.orderId));
  reset();
  document.getElementById('timeoutModal').style.display='none';
};
}

/* ================= SEARCH ================= */
async function search(q,field){
if(q.length<3)return;

const r=await fetch(`https://api.maptiler.com/geocoding/${encodeURIComponent(q)}.json?key=demo`);
const d=await r.json();

const box=document.getElementById('suggest');
box.innerHTML='';

d.features.forEach(p=>{
const el=document.createElement('div');
el.className='item';
el.innerText=p.place_name;

el.onclick=()=>{
S[field]=p.center;
document.getElementById(field).value=p.place_name;
box.innerHTML='';
route();
};
box.appendChild(el);
});
}

/* ================= ROUTE ================= */
async function route(){
if(!S.from||!S.to)return;

const r=await fetch(`https://router.project-osrm.org/route/v1/driving/${S.from[0]},${S.from[1]};${S.to[0]},${S.to[1]}?overview=full&geometries=geojson`);
const d=await r.json();

const km=d.routes[0].distance/1000;

S.minPrice=Math.round(km*2.5+10);
S.price=S.minPrice;

document.getElementById('price').innerText=S.price;
}

/* ================= ORDER ================= */
async function sendOrder(){

S.active=true;

document.getElementById('map').classList.add('map-small');
startTimer();

S.orderId = S.orderId || push(ref(db,'orders')).key;

await set(ref(db,'orders/'+S.orderId),{
  from:S.from,
  to:S.to,
  price:S.price,
  status:"searching",
  createdAt:Date.now()
});
}

/* ================= TIMER ================= */
function startTimer(){
clearTimeout(S.timer);
S.timer=setTimeout(()=>{
document.getElementById('timeoutModal').style.display='flex';
},60000);
}

/* ================= RESTORE ================= */
async function restore(){
const p=localStorage.getItem('price');
if(p)S.price=Number(p);
}

/* ================= RESET ================= */
function reset(){
S.active=false;
S.orderId=null;
S.from=null;
S.to=null;
}
</script>

</body>
</html>
