<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Taxi v15 ENGINE</title>

<script src="https://unpkg.com/maplibre-gl@3.6.2/dist/maplibre-gl.js"></script>
<link href="https://unpkg.com/maplibre-gl@3.6.2/dist/maplibre-gl.css" rel="stylesheet"/>

<style>
body{margin:0;font-family:sans-serif;}
#map{width:100%;height:100vh;}

.start{
position:fixed;inset:0;background:#fff;
display:flex;align-items:center;justify-content:center;z-index:9999;
}

.box{width:300px;}

.input{width:100%;padding:10px;margin:5px 0;border:1px solid #ddd;border-radius:8px;}

.btn{width:100%;padding:12px;background:#f1c40f;border:none;font-weight:bold;border-radius:10px;}

.top{position:absolute;top:10px;left:10px;width:300px;z-index:10;}

.suggest{background:#fff;max-height:180px;overflow:auto;}
.item{padding:8px;cursor:pointer;}
.item:hover{background:#eee;}

.panel{
position:absolute;bottom:20px;left:10px;
background:#fff;padding:12px;border-radius:12px;width:300px;z-index:10;
}

.modal{
position:fixed;inset:0;background:rgba(0,0,0,.5);
display:none;align-items:center;justify-content:center;z-index:9999;
}

.modal-box{background:#fff;padding:20px;width:300px;}

.map-small{height:80vh !important;}

.loader{width:16px;height:16px;border:3px solid #eee;border-top:3px solid #f1c40f;border-radius:50%;animation:spin 1s linear infinite;}
@keyframes spin{to{transform:rotate(360deg)}}
</style>
</head>

<body>

<div class="start" id="start">
  <div class="box">
    <input id="name" class="input" placeholder="Имя">
    <input id="phone" class="input" placeholder="Телефон 9 цифр">
    <button class="btn" id="startBtn">Начать</button>
  </div>
</div>

<div id="map"></div>

<div class="top">
  <input id="from" class="input" placeholder="Откуда">
  <input id="to" class="input" placeholder="Куда">
  <div id="suggest" class="suggest"></div>
</div>

<div class="panel">
<div>Цена: <b id="price">0</b></div>
<button class="btn" id="order">Заказать</button>
</div>

<div class="modal" id="modal">
<div class="modal-box">
<input id="priceInput" class="input">
<input id="priceSlider" type="range">
<button class="btn" id="ok">OK</button>
</div>
</div>

<script type="module">

/* ================= FIREBASE (optional safe) ================= */
let db=null;

/* ================= STATE ENGINE ================= */
const S = {
  map:null,
  from:null,
  to:null,
  price:0,
  minPrice:0,
  active:false,
  orderId:null
};

/* ================= BOOT ================= */
window.addEventListener('DOMContentLoaded', init);

function init(){
  bindUI();
  initMap();
  restore();
}

/* ================= MAP ================= */
function initMap(){
  S.map = new maplibregl.Map({
    container:'map',
    style:'https://api.maptiler.com/maps/streets-v2/style.json?key=demo',
    center:[21,52],
    zoom:12
  });
}

/* ================= UI ================= */
function bindUI(){

/* PHONE FIX */
const phone=document.getElementById('phone');
if(phone){
phone.addEventListener('input',e=>{
  e.target.value = e.target.value.replace(/\D/g,'').slice(0,9);
});
}

/* SEARCH */
document.getElementById('from').oninput=(e)=>search(e.target.value,'from');
document.getElementById('to').oninput=(e)=>search(e.target.value,'to');

/* ORDER */
document.getElementById('order').onclick=order;

/* PRICE */
document.getElementById('ok').onclick=()=>{
  S.price = clamp(S.price);
  document.getElementById('modal').style.display='none';
};

document.getElementById('priceSlider').oninput=(e)=>{
  S.price = Math.min(Number(e.target.value), S.minPrice*5);
  document.getElementById('priceInput').value=S.price;
};
}

/* ================= SEARCH ================= */
let active=null;

async function search(q,field){
active=field;
if(q.length<3)return;

const r=await fetch(`https://api.maptiler.com/geocoding/${encodeURIComponent(q)}.json?key=demo`);
const d=await r.json();

const box=document.getElementById('suggest');
box.innerHTML='';

d.features.forEach(p=>{
const el=document.createElement('div');
el.className='item';
el.innerText=p.place_name;

el.onclick=()=>{
S[field]=p.center;
document.getElementById(field).value=p.place_name;
box.innerHTML='';
route();
};
box.appendChild(el);
});
}

/* ================= ROUTE ================= */
async function route(){
if(!S.from||!S.to)return;

const r=await fetch(`https://router.project-osrm.org/route/v1/driving/${S.from[0]},${S.from[1]};${S.to[0]},${S.to[1]}?overview=full&geometries=geojson`);
const d=await r.json();

const route=d.routes[0];
const km=route.distance/1000;

S.minPrice=Math.round(km*2.5+10);
S.price=S.minPrice;

document.getElementById('price').innerText=S.price;
}

/* ================= ORDER ================= */
function order(){

S.active=true;

document.getElementById('map').classList.add('map-small');

localStorage.setItem('price',S.price);
localStorage.setItem('from',JSON.stringify(S.from));
localStorage.setItem('to',JSON.stringify(S.to));

startTimer();
}

/* ================= TIMER ================= */
let t;
function startTimer(){
clearTimeout(t);
t=setTimeout(()=>{
alert("Водитель не найден");
},60000);
}

/* ================= RESTORE ================= */
function restore(){
const p=localStorage.getItem('price');
const f=localStorage.getItem('from');
const to=localStorage.getItem('to');

if(p)S.price=Number(p);
if(f)S.from=JSON.parse(f);
if(to)S.to=JSON.parse(to);
}

/* ================= PRICE ================= */
function clamp(v){
v=Number(v);
return v<S.minPrice?S.minPrice:v;
}

</script>

</body>
</html>
