<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Taxi Stable v15 FIREBASE</title>

<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#f1c40f">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<meta name="apple-mobile-web-app-title" content="Taxi App">
<link rel="apple-touch-icon" href="https://cdn-icons-png.flaticon.com/512/71/71222.png">

<script src="https://unpkg.com/maplibre-gl@3.6.2/dist/maplibre-gl.js"></script>
<link href="https://unpkg.com/maplibre-gl@3.6.2/dist/maplibre-gl.css" rel="stylesheet"/>

<style>
body { margin:0; font-family:sans-serif; }
#map { width:100%; height:100vh; }

.start {
position:fixed; inset:0;
background:white;
display:flex;
justify-content:center;
align-items:center;
z-index:1000;
}

.box { width:300px; }

.input {
width:100%;
padding:12px;
margin-bottom:10px;
border-radius:10px;
border:1px solid #ddd;
}

.btn {
width:100%;
padding:12px;
border:none;
border-radius:10px;
background:#f1c40f;
font-weight:bold;
cursor:pointer;
}

.error {
color:red;
font-size:12px;
display:none;
margin-top:-5px;
margin-bottom:8px;
}

.top {
position:absolute;
top:15px;
left:10px;
width:320px;
z-index:10;
transition: opacity 0.3s;
}

.box2 {
background:white;
padding:10px;
border-radius:15px;
box-shadow:0 4px 15px rgba(0,0,0,0.1);
}

.input2 {
width:100%;
padding:10px;
border-radius:10px;
border:1px solid #eee;
margin-bottom:6px;
}

.suggest {
background:white;
max-height:180px;
overflow:auto;
border-radius:10px;
box-shadow:0 4px 10px rgba(0,0,0,0.15);
}

.item {
padding:10px;
cursor:pointer;
border-bottom:1px solid #eee;
}
.item:hover { background:#f1f1f1; }

.panel {
position:absolute;
bottom:20px;
left:10px;
width:320px;
background:white;
padding:12px;
border-radius:15px;
display:none;
z-index:20;
box-shadow:0 4px 15px rgba(0,0,0,0.1);
}

.row {
display:flex;
gap:10px;
margin-top:10px;
}

.btn2 {
flex:1;
padding:12px;
border:none;
border-radius:10px;
font-weight:bold;
cursor:pointer;
}

.order { background:#f1c40f; }
.price { background:#e74c3c; color:white; }

.modal {
position:fixed;
inset:0;
background:rgba(0,0,0,0.5);
display:none;
justify-content:center;
align-items:center;
z-index:9999;
}

.modal-content {
background:white;
padding:20px;
border-radius:15px;
width:300px;
}

.field {
width:100%;
padding:10px;
margin-bottom:10px;
border-radius:10px;
border:1px solid #ddd;
}

.ctrl {
position:absolute;
right:10px;
top:120px;
z-index:10;
display:flex;
flex-direction:column;
gap:8px;
}

.ctrl button {
background:white;
border:none;
padding:10px;
border-radius:8px;
cursor:pointer;
box-shadow:0 2px 8px rgba(0,0,0,0.2);
}

.btn-cancel { background: #e74c3c; color: white; margin-top: 10px; width: 100%; }
.loader { border: 3px solid #f3f3f3; border-top: 3px solid #f1c40f; border-radius: 50%; width: 18px; height: 18px; animation: spin 1s linear infinite; display: inline-block; vertical-align: middle; margin-right: 8px; }
@keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }

.map-small { height:80vh !important; }
</style>
</head>

<body>

<div id="driver-status" style="display:none; position:absolute; top:80px; left:50%; transform:translateX(-50%); background:rgba(0,0,0,0.8); color:white; padding:15px 25px; border-radius:20px; z-index:1000; text-align:center; width:80%; max-width:320px;"></div>

<div class="start" id="start">
    <div class="box">
        <h3>Данные</h3>
        <input id="name" class="input" placeholder="Имя">
        <div style="display:flex; gap:6px; align-items:center;">
            <span style="font-weight:bold;">+48</span>
            <input id="phone" class="input" placeholder="9 цифр" inputmode="numeric">
        </div>
        <div class="error" id="phoneError">Неверный номер</div>
        <button class="btn" id="startBtn">Начать</button>
    </div>
</div>

<div id="map"></div>

<div class="top" id="top-search">
    <div class="box2">
        <input id="from" class="input2" placeholder="Откуда">
        <input id="to" class="input2" placeholder="Куда">
        <div class="suggest" id="suggest"></div>
    </div>
</div>

<div class="panel" id="panel">
    <div>Имя: <b id="outName"></b></div>
    <div>Телефон: <b id="outPhone"></b></div>
    <hr>
    <div>Км: <b id="km"></b></div>
    <div>Мин: <b id="min"></b></div>
    <div>Цена: <b id="price"></b> zł</div>
    <div class="row">
        <button class="btn2 price" id="custom">Своя цена</button>
        <button class="btn2 order" id="orderBtn">Заказать</button>
    </div>
</div>

<div class="modal" id="modal">
    <div class="modal-content">
        <h3>Своя цена</h3>
        <div>Минимум: <b id="minPrice"></b> zł</div>
        <input id="priceInput" class="field" type="number">
        <input id="priceSlider" class="field" type="range">
        <select id="reason" class="field">
            <option>Спешу</option>
            <option>На работу</option>
            <option>На автобус</option>
            <option>Другое</option>
        </select>
        <button id="submitPrice" class="btn2 order">OK</button>
    </div>
</div>

<div class="modal" id="modal-timeout">
    <div class="modal-content" style="text-align:center;">
        <div style="font-size:50px;">⏳</div>
        <h3>Водитель не найден</h3>
        <p>Продолжить поиск?</p>
        <div class="row">
            <button class="btn2" id="timeout-cancel">Отменить</button>
            <button class="btn2 order" id="timeout-continue">Продолжить</button>
        </div>
    </div>
</div>

<div id="finalPriceText"
     style="position:absolute;bottom:100px;left:10px;background:white;padding:10px;border-radius:10px;z-index:50;"></div>

<div class="ctrl">
    <button id="btn2d">2D</button>
    <button id="btn3d">3D</button>
</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
import { getDatabase, ref, push, set, get, onValue, remove } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-database.js";

const firebaseConfig = {
apiKey: "AIzaSyAf-9-A72oCswBCQIilwuE6FEYt_MN2PbU",
authDomain: "taxi-app-41298.firebaseapp.com",
databaseURL: "https://taxi-app-41298-default-rtdb.europe-west1.firebasedatabase.app",
projectId: "taxi-app-41298",
storageBucket: "taxi-app-41298.firebasestorage.app",
messagingSenderId: "1011260164934",
appId: "1:1011260164934:web:1972a0315325b3f5d3b347",
measurementId: "G-85C77DBC57"
};

const app = initializeApp(firebaseConfig);
const db = getDatabase(app);

let currentOrderId = null;
let rejectedDrivers = [];
let searchTimer = null;
let map;
let from=null;
let to=null;
let minPrice=0;
let customPrice=0;

window.isOrderPending = false;

/* RESTORE ACTIVE ORDER ONLY */
window.restoreOrder = async function(){
    const snap = await get(ref(db,'orders'));
    const orders = snap.val();
    if(!orders) return;

    const active = Object.entries(orders).find(([id,o]) =>
        o.status === 'searching' || o.status === 'accepted'
    );

    if(!active) return;

    const [id,order] = active;
    currentOrderId = id;

    from = order.clientCoords;
    to = null;
    customPrice = order.price;

    document.getElementById('finalPriceText').innerText =
        "Стоимость поездки составляет: " + order.price + " zł";

    if(order.status === 'searching'){
        startSearchTimer();
    }
};

function startSearchTimer(){
    clearTimeout(searchTimer);
    searchTimer = setTimeout(()=>{
        document.getElementById('modal-timeout').style.display='flex';
    },60000);
}

/* PRICE PATCH */
document.getElementById('priceInput')?.addEventListener('input',(e)=>{
    let v = Number(e.target.value);
    if(v < minPrice) v = minPrice;
    customPrice = v;
});

document.getElementById('priceSlider')?.addEventListener('input',(e)=>{
    customPrice = Math.min(Number(e.target.value), minPrice*5);
    document.getElementById('priceInput').value = customPrice;
});

/* TIMEOUT */
document.getElementById('timeout-continue').onclick = ()=>{
    document.getElementById('modal-timeout').style.display='none';
    window.sendOrderToFirebase();
};

document.getElementById('timeout-cancel').onclick = async ()=>{
    document.getElementById('modal-timeout').style.display='none';
    if(currentOrderId){
        await remove(ref(db,'orders/'+currentOrderId));
        currentOrderId=null;
    }
};

/* MAP HOOK AFTER ORDER */
const oldSend = window.sendOrderToFirebase;

window.sendOrderToFirebase = async function(){
    await oldSend();

    document.getElementById('map').classList.add('map-small');

    if(window.map && from && to){
        setTimeout(()=>{
            map.fitBounds([from,to],{padding:120});
            map.easeTo({pitch:60,bearing:-20});
        },400);
    }

    localStorage.setItem('lastPrice',customPrice);
    localStorage.setItem('lastFrom',JSON.stringify(from));
    localStorage.setItem('lastTo',JSON.stringify(to));

    document.getElementById('finalPriceText').innerText =
        "Стоимость поездки составляет: " + customPrice + " zł";

    startSearchTimer();
};

setTimeout(()=>window.restoreOrder(),800);

</script>

<script>
/* --- ORIGINAL CODE BELOW (UNCHANGED) --- */
let activeInput=null;
let destMarker;
const phone=document.getElementById('phone');
phone.addEventListener('input',()=>phone.value=phone.value.replace(/\D/g,'').slice(0,9));

document.getElementById('startBtn').onclick=()=>{
    if(!document.getElementById('name').value.trim()) return alert("Введите имя");
    if(phone.value.length!==9) return document.getElementById('phoneError').style.display='block';

    document.getElementById('start').style.display='none';

    map=new maplibregl.Map({
        container:'map',
        style:'https://api.maptiler.com/maps/streets-v4/style.json?key=umzJGOnUyr8Edm12MN9b',
        center:[21.01,52.23],
        zoom:13,
        pitch:45
    });

    map.addControl(new maplibregl.NavigationControl());
    const userMarker=new maplibregl.Marker({color:'blue'});
    destMarker = new maplibregl.Marker({color:'red',draggable:true});

    navigator.geolocation.getCurrentPosition(async p=>{
        from=[p.coords.longitude,p.coords.latitude];
        userMarker.setLngLat(from).addTo(map);
        map.flyTo({center:from,zoom:15});
        document.getElementById('from').value=from.join(',');
    });

    map.on('click',e=>{
        if(window.isOrderPending) return;
        to=[e.lngLat.lng,e.lngLat.lat];
        destMarker.setLngLat(to).addTo(map);
        build();
    });
};

async function build(){
    if(!from||!to) return;
    const r=await fetch(`https://router.project-osrm.org/route/v1/driving/${from[0]},${from[1]};${to[0]},${to[1]}?overview=full&geometries=geojson`);
    const d=await r.json();
    const route=d.routes[0];

    const km=route.distance/1000;
    const min=Math.round(route.duration/60);
    minPrice=Math.round(km*2.5+10);

    document.getElementById('panel').style.display='block';
    document.getElementById('km').innerText=km.toFixed(1);
    document.getElementById('min').innerText=min;
    document.getElementById('price').innerText=minPrice;

    if(map.getSource('route')){
        map.getSource('route').setData(route.geometry);
    }else{
        map.addSource('route',{type:'geojson',data:route.geometry});
        map.addLayer({id:'route',type:'line',source:'route',paint:{'line-color':'#f1c40f','line-width':5}});
    }

    map.fitBounds([from,to],{padding:80});
}
</script>

</body>
</html>
