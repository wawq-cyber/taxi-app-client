<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Taxi Stable v15 FIREBASE</title>

<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#f1c40f">

<script src="https://unpkg.com/maplibre-gl@3.6.2/dist/maplibre-gl.js"></script>
<link href="https://unpkg.com/maplibre-gl@3.6.2/dist/maplibre-gl.css" rel="stylesheet"/>

<style>
body { margin:0; font-family:sans-serif; }
#map { width:100%; height:100vh; }

.map-small { height:80vh !important; }
</style>
</head>

<body>

<div id="driver-status"></div>

<div class="start" id="start">
    <div class="box">
        <h3>Данные</h3>
        <input id="name" class="input" placeholder="Имя">
        <div style="display:flex; gap:6px;">
            <span>+48</span>
            <input id="phone" class="input" placeholder="9 цифр">
        </div>
        <div class="error" id="phoneError">Неверный номер</div>
        <button class="btn" id="startBtn">Начать</button>
    </div>
</div>

<div id="map"></div>

<div class="panel" id="panel">
    <div>Имя: <b id="outName"></b></div>
    <div>Телефон: <b id="outPhone"></b></div>
    <div>Цена: <b id="price"></b> zł</div>
    <div id="finalPriceText"></div>
    <button id="orderBtn">Заказать</button>
</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
import { getDatabase, ref, push, set, get, onValue, remove } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-database.js";

const app = initializeApp({ /* твой конфиг */ });
const db = getDatabase(app);

let currentOrderId=null;
let searchTimer=null;

window.sendOrderToFirebase = async function() {

    document.getElementById('map').classList.add('map-small');

    localStorage.setItem('lastPrice', window.customPrice || window.minPrice);

    document.getElementById('finalPriceText').innerText =
        "Стоимость поездки составляет: " + (window.customPrice || window.minPrice) + " zł";

    if(!searchTimer){
        searchTimer=setTimeout(()=>{
            document.getElementById('modal-timeout').style.display='flex';
        },60000);
    }

    if (window.map && window.from && window.to) {
        setTimeout(()=>{
            map.fitBounds([from,to],{padding:120});
            map.easeTo({pitch:60,bearing:-20});
        },300);
    }
};

window.restoreOrder = async function(){
    const phoneVal=document.getElementById('phone').value;
    if(!phoneVal) return;

    const snap=await get(ref(db,'orders'));
    const orders=snap.val();
    if(!orders) return;

    const active=Object.entries(orders).find(([id,o])=>
        o.clientPhone==="+48"+phoneVal &&
        (o.status==='searching'||o.status==='accepted')
    );

    if(!active) return;

    const [id,order]=active;
    currentOrderId=id;

    document.getElementById('price').innerText=order.price;
    window.customPrice=order.price;

    document.getElementById('finalPriceText').innerText =
        "Стоимость поездки составляет: " + order.price + " zł";

    window.clientCoords = order.clientCoords;

    // === ВОССТАНОВЛЕНИЕ МАРШРУТА ===
    if (order.clientCoords && order.fromAddress && order.toAddress) {
        from = order.clientCoords;

        const res = await fetch(`https://api.maptiler.com/geocoding/${encodeURIComponent(order.toAddress)}.json?key=umzJGOnUyr8Edm12MN9b`);
        const data = await res.json();

        if (data.features && data.features[0]) {
            to = data.features[0].center;

            if (window.map) {
                map.flyTo({ center: from, zoom: 15 });

                if (!window.destMarker) {
                    window.destMarker = new maplibregl.Marker({color:'red'}).setLngLat(to).addTo(map);
                } else {
                    window.destMarker.setLngLat(to);
                }

                // ВАЖНО: отрисовка линии
                build();
            }
        }
    }
};
</script>

<script>
let map;
let from=null;
let to=null;
let minPrice=0;
let customPrice=0;

document.getElementById('priceSlider').max=minPrice*5;

document.getElementById('priceInput').addEventListener('keydown',(e)=>{
    if(e.key==='ArrowDown'){
        if(Number(e.target.value)<=minPrice){
            e.preventDefault();
        }
    }
});

document.getElementById('priceInput').addEventListener('blur',(e)=>{
    if(!e.target.value || Number(e.target.value)<minPrice){
        customPrice=minPrice;
        e.target.value=minPrice;
        document.getElementById('priceSlider').value=minPrice;
    }
});

const savedPrice=localStorage.getItem('lastPrice');
if(savedPrice){
    customPrice=Number(savedPrice);
    document.getElementById('price').innerText=customPrice;
}

document.getElementById('startBtn').onclick=()=>{
    setTimeout(()=>window.restoreOrder(),500);
};

document.getElementById('timeout-cancel').onclick=()=>{
    if(currentOrderId){
        remove(ref(db,`orders/${currentOrderId}`));
        currentOrderId=null;
    }
};
</script>

</body>
</html>
