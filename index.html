<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Taxi Stable v15 FIREBASE</title>

<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#f1c40f">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<meta name="apple-mobile-web-app-title" content="Taxi App">
<link rel="apple-touch-icon" href="https://cdn-icons-png.flaticon.com/512/71/71222.png">

<script src="https://unpkg.com/maplibre-gl@3.6.2/dist/maplibre-gl.js"></script>
<link href="https://unpkg.com/maplibre-gl@3.6.2/dist/maplibre-gl.css" rel="stylesheet"/>

<style>
body { margin:0; font-family:sans-serif; }
#map { width:100%; height:100vh; }

/* ДОБАВЛЕНО */
.map-small { height:80vh !important; }

/* остальной твой CSS без изменений */
</style>
</head>

<body>

<div id="driver-status" style="display:none;"></div>

<div class="start" id="start">
    <div class="box">
        <h3>Данные</h3>
        <input id="name" class="input" placeholder="Имя">
        <div style="display:flex; gap:6px; align-items:center;">
            <span style="font-weight:bold;">+48</span>
            <input id="phone" class="input" placeholder="9 цифр" inputmode="numeric">
        </div>
        <div class="error" id="phoneError">Неверный номер</div>
        <button class="btn" id="startBtn">Начать</button>
    </div>
</div>

<div id="map"></div>

<!-- ДОБАВЛЕНО -->
<div id="finalPriceText" style="position:absolute; bottom:100px; left:10px; background:white; padding:10px; border-radius:10px; z-index:50;"></div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
import { getDatabase, ref, push, set, get, onValue, remove } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-database.js";

const app = initializeApp({
  apiKey: "AIza...",
});
const db = getDatabase(app);

let currentOrderId = null;

/* === ДОБАВЛЕНО: восстановление === */
window.restoreOrder = async function() {
    try {
        const phoneVal = document.getElementById('phone').value;
        if (!phoneVal) return;

        const snap = await get(ref(db, 'orders'));
        const orders = snap.val();
        if (!orders) return;

        const active = Object.entries(orders).find(([id, o]) =>
            o.clientPhone === "+48" + phoneVal &&
            (o.status === 'searching' || o.status === 'accepted')
        );

        if (!active) return;

        const [id, order] = active;
        currentOrderId = id;

        document.getElementById('price').innerText = order.price;
        window.customPrice = order.price;

        document.getElementById('finalPriceText').innerText =
            "Стоимость поездки составляет: " + order.price + " zł";

        window.clientCoords = order.clientCoords;

        if (order.clientCoords && order.toAddress) {
            from = order.clientCoords;

            const res = await fetch(`https://api.maptiler.com/geocoding/${encodeURIComponent(order.toAddress)}.json?key=umzJGOnUyr8Edm12MN9b`);
            const data = await res.json();

            if (data.features && data.features[0]) {
                to = data.features[0].center;

                setTimeout(() => {
                    if (window.map) build();
                }, 1000);
            }
        }

    } catch(e) {
        console.log(e);
    }
};
</script>

<script>
let map;
let from=null;
let to=null;
let minPrice=0;
let customPrice=0;

/* === ДОБАВЛЕНО: защита цены === */
const priceInputEl = document.getElementById('priceInput');
if (priceInputEl) {

    priceInputEl.addEventListener('keydown', (e) => {
        if (e.key === 'ArrowDown' && Number(e.target.value) <= minPrice) {
            e.preventDefault();
        }
    });

    priceInputEl.addEventListener('blur', (e) => {
        if (!e.target.value || Number(e.target.value) < minPrice) {
            customPrice = minPrice;
            e.target.value = minPrice;
        }
    });
}

/* === ДОБАВЛЕНО: сохранение цены === */
const savedPrice = localStorage.getItem('lastPrice');
if (savedPrice) {
    customPrice = Number(savedPrice);
}

/* === ДОБАВЛЕНО: старт === */
document.getElementById('startBtn').onclick=()=>{
    setTimeout(()=>window.restoreOrder(),800);
};

/* === ДОБАВЛЕНО: удаление заказа === */
document.getElementById('timeout-cancel')?.addEventListener('click',()=>{
    if(currentOrderId){
        remove(ref(db,`orders/${currentOrderId}`));
        currentOrderId=null;
    }
});

/* === ДОБАВЛЕНО: 3D карта === */
const oldSend = window.sendOrderToFirebase;
if(oldSend){
window.sendOrderToFirebase = async function(){
    await oldSend();

    document.getElementById('map').classList.add('map-small');

    document.getElementById('finalPriceText').innerText =
        "Стоимость поездки составляет: " + (window.customPrice || window.minPrice) + " zł";

    localStorage.setItem('lastPrice', window.customPrice || window.minPrice);

    if (window.map && from && to) {
        setTimeout(()=>{
            map.fitBounds([from,to],{padding:120});
            map.easeTo({pitch:60,bearing:-20});
        },300);
    }
};
}
</script>

</body>
</html>
